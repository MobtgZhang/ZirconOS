# ZirconOS GRUB 配置
# Phase 1: GRUB boot + kernel entry + VGA output

set timeout=3
set default=0

# 加载 multiboot2 与磁盘/视频模块
insmod multiboot2
insmod biosdisk
insmod part_gpt
insmod ext2
insmod video_bochs
insmod video_cirrus
insmod vbe
insmod gfxterm
set gfxpayload=text

menuentry "ZirconOS (UEFI)" {
    # UEFI: chainload ZirconOS EFI application
    if [ -e /EFI/ZirconOS/zirconos.efi ]; then
        chainloader /EFI/ZirconOS/zirconos.efi
        boot
    fi
    echo "UEFI: zirconos.efi not found, falling back to BIOS..."
    multiboot2 /boot/kernel.elf
    boot
}

menuentry "ZirconOS (BIOS / Multiboot2)" {
    # BIOS: Multiboot2 内核，VGA 文本模式
    set root='cd0'
    multiboot2 /boot/kernel.elf
    boot
}
