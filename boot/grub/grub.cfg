# ZirconOS v1.0 GRUB Configuration
# NT-style Hybrid Microkernel OS
#
# This GRUB config supports two boot paths:
#   1. Direct GRUB boot (Multiboot2 -> kernel.elf)
#   2. Chainload to ZirconOS Boot Manager (ZBM)
#
# Partition scheme support: MBR and GPT

set timeout=10
set timeout_style=menu
set default=0

# ── Theme & Display ──
set menu_color_normal=light-gray/black
set menu_color_highlight=white/blue

set gfxmode=auto
insmod all_video
insmod gfxterm

if loadfont unicode ; then
    terminal_output gfxterm
elif loadfont ascii ; then
    terminal_output gfxterm
else
    terminal_output console
fi

# Keep graphics mode for kernel framebuffer console
set gfxpayload=keep

insmod multiboot2
insmod part_gpt
insmod part_msdos
insmod ext2
insmod fat
insmod chain
insmod ntfs

if [ "${grub_platform}" = "pc" ]; then
    insmod biosdisk
    insmod vbe
fi

if [ "${grub_platform}" = "efi" ]; then
    insmod efi_gop
    insmod efi_uga
fi

# ════════════════════════════════════════════════════
#  ZirconOS Boot Manager Selection
# ════════════════════════════════════════════════════

menuentry "ZirconOS v1.0 — Normal Boot" {
    multiboot2 /boot/kernel.elf
    boot
}

menuentry "ZirconOS v1.0 — Debug Mode (Serial + VGA)" {
    multiboot2 /boot/kernel.elf -- console=serial,vga debug=1 verbose=1
    boot
}

# ── ZirconOS Boot Manager (ZBM) ──

submenu "ZirconOS Boot Manager (ZBM) >" {

    if [ "${grub_platform}" = "efi" ]; then
        menuentry "ZBM — UEFI Boot Manager" {
            chainloader /EFI/BOOT/BOOTX64.EFI
        }
    fi

    if [ "${grub_platform}" = "pc" ]; then
        menuentry "ZBM — BIOS Boot Manager (Chainload MBR)" {
            set root=(hd0)
            chainloader +1
        }

        menuentry "ZBM — BIOS Boot Manager (Chainload Partition)" {
            set root=(hd0,msdos1)
            chainloader +1
        }
    fi

    menuentry "Back to Main Menu" {
        configfile /boot/grub/grub.cfg
    }
}

# ── Advanced Boot Options ──

submenu "Advanced Boot Options >" {

    menuentry "Serial Debug Only" {
        multiboot2 /boot/kernel.elf -- console=serial debug=1
        boot
    }

    menuentry "Safe Mode (Minimal Modules)" {
        multiboot2 /boot/kernel.elf -- safe_mode=1 debug=0 minimal=1
        boot
    }

    menuentry "Safe Mode with Networking" {
        multiboot2 /boot/kernel.elf -- safe_mode=1 debug=0 network=1
        boot
    }

    menuentry "Release Build (Optimized)" {
        multiboot2 /boot/kernel.elf -- debug=0 release=1
        boot
    }

    menuentry "Last Known Good Configuration" {
        multiboot2 /boot/kernel.elf -- lastknowngood=1
        boot
    }

    menuentry "Back to Main Menu" {
        configfile /boot/grub/grub.cfg
    }
}

# ── Win32 Subsystem ──

submenu "Win32 Subsystem >" {

    menuentry "Full Demo (Phase 0-11)" {
        multiboot2 /boot/kernel.elf -- console=serial,vga debug=1 win32=full gui=full wow64=full
        boot
    }

    menuentry "CMD Shell Only" {
        multiboot2 /boot/kernel.elf -- console=serial,vga shell=cmd
        boot
    }

    menuentry "PowerShell Only" {
        multiboot2 /boot/kernel.elf -- console=serial,vga shell=powershell
        boot
    }

    menuentry "GUI Demo (user32/gdi32)" {
        multiboot2 /boot/kernel.elf -- console=serial,vga debug=1 gui=full
        boot
    }

    menuentry "WOW64 Demo (32-bit Compat)" {
        multiboot2 /boot/kernel.elf -- console=serial,vga debug=1 wow64=full
        boot
    }

    menuentry "Back to Main Menu" {
        configfile /boot/grub/grub.cfg
    }
}

# ── Recovery & Diagnostics ──

submenu "Recovery & Diagnostics >" {

    menuentry "Recovery Console" {
        multiboot2 /boot/kernel.elf -- recovery=1 console=serial,vga debug=1
        boot
    }

    menuentry "Last Known Good Configuration" {
        multiboot2 /boot/kernel.elf -- lastknowngood=1
        boot
    }

    menuentry "Boot Info (Partition Detection)" {
        multiboot2 /boot/kernel.elf -- bootinfo=1 console=serial,vga debug=1
        boot
    }

    menuentry "Back to Main Menu" {
        configfile /boot/grub/grub.cfg
    }
}

# ── System ──

menuentry "Reboot" {
    reboot
}

menuentry "Shutdown" {
    halt
}
