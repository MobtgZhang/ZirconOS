# ZirconOS v1.0 GRUB Configuration
# Supports both BIOS and UEFI GRUB

set timeout=3
set default=0

insmod multiboot2
insmod part_gpt
insmod ext2

# BIOS-specific modules
if [ "${grub_platform}" = "pc" ]; then
    insmod biosdisk
    insmod vbe
    insmod gfxterm
    set gfxpayload=text
fi

menuentry "ZirconOS v1.0 (Multiboot2)" {
    set root='cd0'
    multiboot2 /boot/kernel.elf
    boot
}

menuentry "ZirconOS v1.0 (Multiboot2, serial debug)" {
    set root='cd0'
    multiboot2 /boot/kernel.elf -- console=serial
    boot
}

# UEFI direct boot: use  make run-uefi-x86_64  or  make run-uefi-aarch64
