# ZirconOS v1.0 GRUB Configuration
# Supports both BIOS and UEFI GRUB
# Phase 0-11: NT-style Hybrid Microkernel OS
# FAT32 (C:\) + NTFS (D:\) dual file system
# Win32 subsystem + GUI (user32/gdi32) + WOW64 (32-bit compat)

set timeout=5
set default=0

insmod multiboot2
insmod part_gpt
insmod ext2
insmod fat

if [ "${grub_platform}" = "pc" ]; then
    insmod biosdisk
    insmod vbe
    insmod gfxterm
    set gfxpayload=text
fi

if [ "${grub_platform}" = "efi" ]; then
    insmod efi_gop
    insmod efi_uga
fi

# ── BIOS Boot Modes ──

menuentry "ZirconOS v1.0 (BIOS - Normal)" {
    set root='cd0'
    multiboot2 /boot/kernel.elf
    boot
}

menuentry "ZirconOS v1.0 (BIOS - Debug)" {
    set root='cd0'
    multiboot2 /boot/kernel.elf -- console=serial,vga debug=1 verbose=1
    boot
}

menuentry "ZirconOS v1.0 (BIOS - Serial Debug)" {
    set root='cd0'
    multiboot2 /boot/kernel.elf -- console=serial debug=1
    boot
}

menuentry "ZirconOS v1.0 (BIOS - Safe Mode)" {
    set root='cd0'
    multiboot2 /boot/kernel.elf -- safe_mode=1 debug=0 minimal=1
    boot
}

menuentry "ZirconOS v1.0 (BIOS - Safe Mode with Networking)" {
    set root='cd0'
    multiboot2 /boot/kernel.elf -- safe_mode=1 debug=0 network=1
    boot
}

# ── UEFI Boot Modes ──

menuentry "ZirconOS v1.0 (UEFI - Normal)" {
    set root='cd0'
    multiboot2 /boot/kernel.elf -- boot=uefi
    boot
}

menuentry "ZirconOS v1.0 (UEFI - Debug)" {
    set root='cd0'
    multiboot2 /boot/kernel.elf -- boot=uefi console=serial,vga debug=1 verbose=1
    boot
}

menuentry "ZirconOS v1.0 (UEFI - Release)" {
    set root='cd0'
    multiboot2 /boot/kernel.elf -- boot=uefi debug=0 release=1
    boot
}

# ── Win32 Subsystem Modes ──

menuentry "ZirconOS v1.0 (Win32 Console - Full Demo)" {
    set root='cd0'
    multiboot2 /boot/kernel.elf -- console=serial,vga debug=1 win32=full
    boot
}

menuentry "ZirconOS v1.0 (CMD Shell Only)" {
    set root='cd0'
    multiboot2 /boot/kernel.elf -- console=serial,vga shell=cmd
    boot
}

menuentry "ZirconOS v1.0 (PowerShell Only)" {
    set root='cd0'
    multiboot2 /boot/kernel.elf -- console=serial,vga shell=powershell
    boot
}

# ── GUI Subsystem Modes ──

menuentry "ZirconOS v1.0 (GUI Demo - user32/gdi32)" {
    set root='cd0'
    multiboot2 /boot/kernel.elf -- console=serial,vga debug=1 gui=full
    boot
}

# ── WOW64 Modes ──

menuentry "ZirconOS v1.0 (WOW64 Demo - 32-bit Compatibility)" {
    set root='cd0'
    multiboot2 /boot/kernel.elf -- console=serial,vga debug=1 wow64=full
    boot
}

menuentry "ZirconOS v1.0 (Full Demo - Phase 0-11)" {
    set root='cd0'
    multiboot2 /boot/kernel.elf -- console=serial,vga debug=1 win32=full gui=full wow64=full
    boot
}

# ── Recovery ──

menuentry "ZirconOS v1.0 (Recovery Console)" {
    set root='cd0'
    multiboot2 /boot/kernel.elf -- recovery=1 console=serial,vga debug=1
    boot
}

menuentry "ZirconOS v1.0 (Last Known Good Configuration)" {
    set root='cd0'
    multiboot2 /boot/kernel.elf -- lastknowngood=1
    boot
}
