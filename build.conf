# ZirconOS Build Configuration
# This file controls which OS image variant the build system produces.
# Edit this file and run 'make' to build the configured variant.
#
# All settings can be overridden via environment variables or make arguments:
#   make DESKTOP=aero BOOT_METHOD=uefi BOOTLOADER=grub
#
# Or set them here for persistent defaults.

# ── Architecture ──
# Supported: x86_64, aarch64, loongarch64, riscv64, mips64el
# For aarch64: run 'make fetch-firmware' for EDK2 nightly UEFI firmware (https://retrage.github.io/edk2-nightly/)
# For loongarch64 — 仅支持 ZBM + UEFI（无 GRUB）；Makefile 会拒绝 BOOTLOADER=grub。
# QEMU 固件默认 ~/Firmware/LoongArchVirtMachine/QEMU_EFI.fd（Makefile -bios）。
# 默认可移动介质引导：\EFI\BOOT\BOOTLOONGARCH64.EFI（ZBM）；否则易进入固件 Shell。
# 固件/备用：make fetch-firmware 或 make fetch-loongarch-boot-efi（EDK2 Shell，可选）。
# ZBM：boot/zbm/uefi/main_loongarch64.zig → GNU-EFI → .efi；首次需 make fetch-gnu-efi。
# 链接：优先 loongarch64-linux-gnu-gcc，否则 zig cc；objcopy 需 llvm-objcopy 或 loongarch64-*-objcopy。
# QEMU：BOOT_METHOD=mbr → LOONGARCH64_QEMU_MODE=kernel（-kernel 直启，开发）；uefi → -bios+ESP。
ARCH = x86_64

# ── Boot Method ──
# mbr   — Legacy BIOS (Master Boot Record)
# uefi  — UEFI firmware (GPT + ESP)
BOOT_METHOD = uefi

# ── Bootloader ──
# grub  — GNU GRUB（loongarch64 不可用）
# zbm   — ZirconOS Boot Manager（loongarch64 必选）
BOOTLOADER = grub

# ── Desktop Theme ──
# classic    — Windows 2000 Classic
# luna       — Windows XP Luna
# aero       — Windows Vista/7 Aero Glass
# modern     — Windows 8 Metro
# fluent     — Windows 10 Fluent Design
# sunvalley  — Windows 11 Sun Valley (WinUI 3)
# none       — Text/CMD mode only (no GUI)
DESKTOP = none

# ── Build Optimization ──
# Debug        — Full debug info, verbose logging
# ReleaseSafe  — Optimized with safety checks
# ReleaseFast  — Maximum performance
# ReleaseSmall — Minimum binary size
OPTIMIZE = Debug

# ── Display / QEMU ──
RESOLUTION = 1024x768x32
QEMU_MEM = 512M
# LoongArch (make run-loongarch64): qemu-system-loongarch64 -M virt 要求客户机内存严格大于 1G。
# 覆盖方式：make QEMU_MEM_LOONGARCH64=2G run   或在下方取消注释：
# QEMU_MEM_LOONGARCH64 = 1536M

# ── Features ──
ENABLE_IDT = true
DEBUG_LOG = true

# ── GRUB Menu ──
# all     — Show all desktop themes + boot modes in GRUB menu
# minimal — Show only the configured DESKTOP as the single boot entry
GRUB_MENU = minimal
