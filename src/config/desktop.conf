# ZirconOS Desktop Configuration
# Defines desktop environment parameters for the shell.
# Referenced by: src/config/defaults.zig → src/config/config.zig
#
# Available themes (源码与资源均在 src/desktop/<name>/，含 resources/ 子目录):
#   classic    - ZirconOS Classic
#   luna       - ZirconOS Luna
#   aero       - ZirconOS Aero
#   modern     - ZirconOS Modern
#   fluent     - ZirconOS Fluent
#   sunvalley  - ZirconOS SunValley
#
# Theme-specific color_scheme values:
#   classic:    classic_95 | classic_2000 | highcontrast
#   luna:       blue | olive | silver
#   aero:       zircon_blue | zircon_graphite | zircon_aurora | highcontrast
#   modern:     cobalt | emerald | crimson | mango | purple | teal
#   fluent:     light | dark
#   sunvalley:  light | dark

[desktop]
theme = sunvalley
color_scheme = dark
shell = zshell
auto_logon = false
auto_logon_user =

[resolution]
width = 1280
height = 800
bpp = 32
refresh_rate = 60
dpi = 96

[wallpaper]
style = solid_color
color = 0x081222
path = src/desktop/sunvalley/resources/wallpapers/zircon_valley_dark.svg

[display]
driver = auto
vsync = true
double_buffer = true
hardware_cursor = true
max_monitors = 4
primary_monitor = 0

[video_driver]
vga_enabled = true
vga_base = 0xB8000
framebuffer_enabled = true
hdmi_enabled = false
hdmi_audio = false
edid_detect = true

[dwm]
composition_enabled = true
mica_enabled = true
mica_opacity = 210
mica_blur_radius = 60
mica_luminosity = 160
mica_tint_color = 0x1C1C1C
mica_tint_opacity = 70
acrylic2_enabled = true
acrylic2_luminosity_blend = 160
acrylic_noise_opacity = 4
glass_enabled = true
glass_opacity = 210
glass_blur_radius = 20
glass_saturation = 180
glass_tint_color = 0x1C1C1C
glass_tint_opacity = 70
animation_enabled = true
animation_implicit = true
peek_enabled = true
shadow_enabled = true
shadow_layers = 5
shadow_size = 12
shadow_spread = 4
vsync_compositor = true
round_corners = true
corner_radius = 8
sdf_antialias = true
snap_layout_enabled = true
snap_zones = 6
taskbar_centered = true
widget_panel_enabled = true
quick_settings_enabled = true
drr_enabled = true
drr_min_hz = 60
drr_max_hz = 120
auto_hdr = false
shell_process_split = true
depth_shadow_layers = 5
virtual_desktops = 8
mpo_enabled = true

[mouse]
sensitivity = 10
acceleration = true
acceleration_threshold = 6
smooth_scrolling = true
interpolation_enabled = true
interpolation_steps = 4
poll_rate = 125
cursor_trail = false
cursor_shadow = true

[window_manager]
max_windows = 128
max_z_order = 256
focus_follows_mouse = false
snap_to_edge = true
animate_windows = true
animation_speed = 150
shadow_enabled = true
shadow_size = 8

[taskbar]
position = bottom
height = 48
centered = true
auto_hide = false
show_clock = true
show_tray = true
show_search = true
show_task_view = true
show_widgets = true
group_similar = true
glass_enabled = true
show_peek = true
pill_indicators = true

[startmenu]
style = sunvalley
centered = true
show_pinned = true
show_recommended = true
show_all_apps = true
show_search = true
show_user_profile = true
show_power = true
mica_enabled = true
corner_radius = 8

[icons]
show_desktop_icons = true
icon_size = 48
icon_spacing_x = 80
icon_spacing_y = 90
auto_arrange = true
align_to_grid = true
show_computer = true
show_documents = true
show_network = true
show_recycle_bin = true
show_browser = true
show_icon_shadows = true

[login]
welcome_screen = true
fast_user_switching = true
screen_saver_timeout = 600
lock_timeout = 300
panel_width = 400
panel_height = 320
glass_panel = true

[fonts]
system_font = Noto Sans
system_font_size = 9
titlebar_font = Noto Sans
titlebar_font_size = 9
menu_font = Noto Sans
menu_font_size = 9
icon_font = Noto Sans
icon_font_size = 9
clock_font = Noto Sans
clock_font_size = 9
monospace_font = Source Code Pro
monospace_font_size = 10
cjk_font = Noto Sans CJK SC
cjk_font_size = 9
serif_font = Noto Serif
serif_font_size = 9
font_search_path = src/fonts
