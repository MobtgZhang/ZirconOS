[SoundScheme]
name = ZirconOS Crystal
version = 1.0
description = Glass-inspired ambient sound scheme for ZirconOS Aero
author = ZirconOS Project
license = LGPL-2.1
format = WAV
sample_rate = 44100
bit_depth = 16
channels = stereo

; =========================================================================
; System Events - Core OS lifecycle sounds
; =========================================================================

[SystemEvents]
startup = zircon_startup.wav
shutdown = zircon_shutdown.wav
logon = zircon_logon.wav
logoff = zircon_logoff.wav
lock = zircon_lock.wav
unlock = zircon_unlock.wav
sleep = zircon_sleep.wav
wake = zircon_wake.wav

; =========================================================================
; Dialog Events - User feedback and prompts
; =========================================================================

[DialogEvents]
error = zircon_error.wav
warning = zircon_warning.wav
notification = zircon_notify.wav
information = zircon_info.wav
question = zircon_question.wav
critical_stop = zircon_critical.wav

; =========================================================================
; Navigation Events - File management and browsing
; =========================================================================

[NavigationEvents]
navigate_forward = zircon_nav_forward.wav
navigate_back = zircon_nav_back.wav
open_folder = zircon_folder_open.wav
close_folder = zircon_folder_close.wav
delete_item = zircon_delete.wav
recycle = zircon_recycle.wav
empty_recycle = zircon_recycle_empty.wav

; =========================================================================
; Window Events - Window management
; =========================================================================

[WindowEvents]
minimize = zircon_minimize.wav
maximize = zircon_maximize.wav
restore = zircon_restore.wav
close_window = zircon_window_close.wav
snap = zircon_snap.wav
menu_open = zircon_menu_open.wav
menu_close = zircon_menu_close.wav
menu_select = zircon_menu_select.wav

; =========================================================================
; Device Events - Hardware connections
; =========================================================================

[DeviceEvents]
device_connect = zircon_device_connect.wav
device_disconnect = zircon_device_disconnect.wav
device_fail = zircon_device_fail.wav
battery_low = zircon_battery_low.wav
battery_critical = zircon_battery_critical.wav

; =========================================================================
; Communication Events - Messaging and networking
; =========================================================================

[CommunicationEvents]
new_message = zircon_message.wav
new_mail = zircon_mail.wav
calendar_reminder = zircon_reminder.wav
instant_message = zircon_im.wav
call_incoming = zircon_call_in.wav
call_end = zircon_call_end.wav

; =========================================================================
; Interaction Events - UI feedback
; =========================================================================

[InteractionEvents]
click = zircon_click.wav
hover_button = zircon_hover.wav
toggle_on = zircon_toggle_on.wav
toggle_off = zircon_toggle_off.wav
search_complete = zircon_search_done.wav
print_complete = zircon_print_done.wav
screenshot = zircon_screenshot.wav

; =========================================================================
; Sound Design Notes
; =========================================================================

; Design philosophy:
;   - Crystal glass aesthetic: clean tones, subtle resonance, no harshness
;   - Startup/shutdown: 3-5 second ambient crystal chimes, layered harmonics
;   - Errors/warnings: short tonal cues (< 1 second), distinct but not alarming
;   - Navigation: micro-interactions (< 0.3 seconds), soft taps and slides
;   - Window events: glass movement sounds, subtle whooshes
;   - Device events: connection tones with ascending/descending pitch
;   - All sounds use a consistent tonal palette rooted in C major / A minor
;   - Reverb and spatial audio for a glassy, open atmosphere
;
; Target loudness: -18 LUFS (integrated)
; Peak: -1 dBTP
