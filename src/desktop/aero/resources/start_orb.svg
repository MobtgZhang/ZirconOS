<svg viewBox="0 0 54 54" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="orbBg" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#5BA8E8"/>
      <stop offset="60%" stop-color="#3878C8"/>
      <stop offset="100%" stop-color="#1850A0"/>
    </radialGradient>
    <radialGradient id="orbHighlight" cx="45%" cy="30%" r="40%">
      <stop offset="0%" stop-color="white" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="orbRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#80C0F0"/>
      <stop offset="100%" stop-color="#3888D0"/>
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="27" cy="27" r="24" fill="none" stroke="url(#orbRing)" stroke-width="2" opacity="0.8"/>

  <!-- Main orb -->
  <circle cx="27" cy="27" r="20" fill="url(#orbBg)"/>

  <!-- Highlight -->
  <ellipse cx="24" cy="22" rx="14" ry="10" fill="url(#orbHighlight)"/>

  <!-- Z mark -->
  <line x1="18" y1="20" x2="36" y2="20" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.95"/>
  <line x1="36" y1="20" x2="18" y2="34" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.95"/>
  <line x1="18" y1="34" x2="36" y2="34" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.95"/>
</svg>
