<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neswGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A8F0F0"/>
      <stop offset="30%" stop-color="#2ABFBF"/>
      <stop offset="70%" stop-color="#1A8A8A"/>
      <stop offset="100%" stop-color="#0D5C5C"/>
    </linearGradient>
    <linearGradient id="neswShine" x1="100%" y1="0%" x2="40%" y2="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="neswGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
      <feFlood flood-color="#2ABFBF" flood-opacity="0.45" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark outline -->
  <g fill="url(#neswGrad)" filter="url(#neswGlow)" stroke="#0D5C5C" stroke-width="0.3" stroke-linejoin="round">
    <!-- NE arrowhead -->
    <polygon points="29,3 21,3 25,7"/>
    <polygon points="29,3 29,11 25,7"/>
    <!-- SW arrowhead -->
    <polygon points="3,29 11,29 7,25"/>
    <polygon points="3,29 3,21 7,25"/>
    <!-- Connecting shaft -->
    <path d="M26,9 L23,6 L6,23 L9,26 Z"/>
  </g>
  <!-- Outer dark outline layer -->
  <g fill="none" stroke="#062828" stroke-width="0.6" stroke-linejoin="round">
    <polygon points="29,3 21,3 25,7"/>
    <polygon points="29,3 29,11 25,7"/>
    <polygon points="3,29 11,29 7,25"/>
    <polygon points="3,29 3,21 7,25"/>
    <path d="M26,9 L23,6 L6,23 L9,26 Z"/>
  </g>
  <!-- Glass body fill on top -->
  <g fill="url(#neswGrad)" filter="url(#neswGlow)" stroke="#0D5C5C" stroke-width="0.3" stroke-linejoin="round">
    <polygon points="29,3 21,3 25,7"/>
    <polygon points="29,3 29,11 25,7"/>
    <polygon points="3,29 11,29 7,25"/>
    <polygon points="3,29 3,21 7,25"/>
    <path d="M26,9 L23,6 L6,23 L9,26 Z"/>
  </g>
  <!-- Highlight -->
  <path d="M28,4 L23,4 L25,6 Z" fill="url(#neswShine)" opacity="0.7"/>
  <!-- Sparkles -->
  <circle cx="28" cy="4" r="0.8" fill="white" opacity="0.85"/>
  <circle cx="4" cy="28" r="0.6" fill="#A8F0F0" opacity="0.6"/>
</svg>
