<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nwseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A8F0F0"/>
      <stop offset="30%" stop-color="#2ABFBF"/>
      <stop offset="70%" stop-color="#1A8A8A"/>
      <stop offset="100%" stop-color="#0D5C5C"/>
    </linearGradient>
    <linearGradient id="nwseShine" x1="0%" y1="0%" x2="60%" y2="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="nwseGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
      <feFlood flood-color="#2ABFBF" flood-opacity="0.45" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark outline -->
  <path d="M2,2 L12,2 L9,5 L13.5,9.5 L19,4 L27,4 L27,12 L22.5,18.5 L27,23 L27,31 L17,31 L20,28 L15.5,23.5 L10,29 L2,29 L2,21 L6.5,15.5 L2,11 Z"
        fill="#0A3D3D" stroke="#062828" stroke-width="0.7" stroke-linejoin="round"
        transform="rotate(0,16,16)"/>
  <!-- Simplified diagonal double arrow -->
  <g fill="url(#nwseGrad)" filter="url(#nwseGlow)" stroke="#0D5C5C" stroke-width="0.3" stroke-linejoin="round">
    <!-- NW arrowhead -->
    <polygon points="3,3 11,3 7,7"/>
    <polygon points="3,3 3,11 7,7"/>
    <!-- SE arrowhead -->
    <polygon points="29,29 21,29 25,25"/>
    <polygon points="29,29 29,21 25,25"/>
    <!-- Connecting shaft -->
    <path d="M6,9 L9,6 L26,23 L23,26 Z"/>
  </g>
  <!-- Highlight -->
  <path d="M4,4 L9,4 L7,6 Z" fill="url(#nwseShine)" opacity="0.7"/>
  <!-- Sparkles -->
  <circle cx="4" cy="4" r="0.8" fill="white" opacity="0.85"/>
  <circle cx="28" cy="28" r="0.6" fill="#A8F0F0" opacity="0.6"/>
</svg>
