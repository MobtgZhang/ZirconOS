<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="arrowGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#A8F0F0"/>
      <stop offset="30%" stop-color="#2ABFBF"/>
      <stop offset="70%" stop-color="#1A8A8A"/>
      <stop offset="100%" stop-color="#0D5C5C"/>
    </linearGradient>
    <linearGradient id="arrowShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="arrowGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="blur"/>
      <feFlood flood-color="#2ABFBF" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark outline for visibility -->
  <path d="M4,1 L4,27 L10,21 L16,30 L20,28 L14,19 L22,19 Z"
        fill="#0A3D3D" stroke="#062828" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Glass body -->
  <path d="M5,2.5 L5,25.5 L10.5,20 L16,28.5 L19,27 L13.5,18.5 L20.5,18.5 Z"
        fill="url(#arrowGrad)" filter="url(#arrowGlow)" stroke="#0D5C5C" stroke-width="0.5" stroke-linejoin="round"/>
  <!-- Glass highlight streak -->
  <path d="M6,4 L6,18 L8,16 L8,6 Z" fill="url(#arrowShine)" opacity="0.8"/>
  <!-- Edge sparkle -->
  <circle cx="5.5" cy="3" r="1" fill="white" opacity="0.9"/>
  <circle cx="18" cy="18" r="0.6" fill="#A8F0F0" opacity="0.7"/>
</svg>
