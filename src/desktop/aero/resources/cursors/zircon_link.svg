<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="handGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#A8F0F0"/>
      <stop offset="35%" stop-color="#2ABFBF"/>
      <stop offset="75%" stop-color="#1A8A8A"/>
      <stop offset="100%" stop-color="#0D5C5C"/>
    </linearGradient>
    <linearGradient id="handShine" x1="30%" y1="0%" x2="70%" y2="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="handGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
      <feFlood flood-color="#2ABFBF" flood-opacity="0.45" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark outline -->
  <path d="M11,1 L11,8 L8,8 L8,14 L6,14 L6,18 L4,18 L4,24 C4,28 8,31 13,31 L22,31 C25,31 28,28 28,24 L28,14 L14,14 L14,1 Z"
        fill="#0A3D3D" stroke="#062828" stroke-width="0.8" stroke-linejoin="round"/>
  <!-- Glass hand body -->
  <path d="M12,2 L12,9 L9,9 L9,15 L7,15 L7,19 L5,19 L5,24 C5,27.5 8.5,30 13,30 L22,30 C24.5,30 27,27.5 27,24 L27,15 L15,15 L15,2 Z"
        fill="url(#handGrad)" filter="url(#handGlow)" stroke="#0D5C5C" stroke-width="0.4" stroke-linejoin="round"/>
  <!-- Finger separators -->
  <line x1="12" y1="9" x2="12" y2="15" stroke="#0D5C5C" stroke-width="0.5" opacity="0.6"/>
  <line x1="9" y1="12" x2="9" y2="15" stroke="#0D5C5C" stroke-width="0.5" opacity="0.6"/>
  <line x1="7" y1="15" x2="7" y2="19" stroke="#0D5C5C" stroke-width="0.5" opacity="0.6"/>
  <!-- Glass highlight -->
  <path d="M13,3 L13,10 L15,10 L15,5 Z" fill="url(#handShine)" opacity="0.7"/>
  <ellipse cx="16" cy="22" rx="8" ry="5" fill="url(#handShine)" opacity="0.3"/>
  <!-- Sparkle -->
  <circle cx="13" cy="2.5" r="0.8" fill="white" opacity="0.85"/>
</svg>
