<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nsGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#A8F0F0"/>
      <stop offset="30%" stop-color="#2ABFBF"/>
      <stop offset="70%" stop-color="#1A8A8A"/>
      <stop offset="100%" stop-color="#0D5C5C"/>
    </linearGradient>
    <linearGradient id="nsShine" x1="30%" y1="0%" x2="70%" y2="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="nsGlow" x="-25%" y="-15%" width="150%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
      <feFlood flood-color="#2ABFBF" flood-opacity="0.45" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark outline -->
  <path d="M16,1 L22,8 L18.5,8 L18.5,24 L22,24 L16,31 L10,24 L13.5,24 L13.5,8 L10,8 Z"
        fill="#0A3D3D" stroke="#062828" stroke-width="0.8" stroke-linejoin="round"/>
  <!-- Glass body -->
  <path d="M16,2.5 L21,8.5 L18,8.5 L18,23.5 L21,23.5 L16,29.5 L11,23.5 L14,23.5 L14,8.5 L11,8.5 Z"
        fill="url(#nsGrad)" filter="url(#nsGlow)" stroke="#0D5C5C" stroke-width="0.3" stroke-linejoin="round"/>
  <!-- Highlight streak -->
  <path d="M15,4 L16.5,4 L16.5,15 L15,15 Z" fill="url(#nsShine)" opacity="0.6"/>
  <!-- Sparkles -->
  <circle cx="16" cy="3" r="0.8" fill="white" opacity="0.85"/>
  <circle cx="16" cy="29" r="0.6" fill="#A8F0F0" opacity="0.6"/>
</svg>
