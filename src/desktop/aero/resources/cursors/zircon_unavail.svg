<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="unavailGrad" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#A8F0F0"/>
      <stop offset="40%" stop-color="#2ABFBF"/>
      <stop offset="80%" stop-color="#1A8A8A"/>
      <stop offset="100%" stop-color="#0D5C5C"/>
    </radialGradient>
    <linearGradient id="unavailShine" x1="30%" y1="10%" x2="70%" y2="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="slashGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="50%" stop-color="#CC3333"/>
      <stop offset="100%" stop-color="#991111"/>
    </linearGradient>
    <filter id="unavailGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="blur"/>
      <feFlood flood-color="#2ABFBF" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark outline circle -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#062828" stroke-width="3.5"/>
  <!-- Glass circle ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="url(#unavailGrad)" stroke-width="2.5" filter="url(#unavailGlow)"/>
  <!-- Inner glass fill (very transparent) -->
  <circle cx="16" cy="16" r="11.5" fill="url(#unavailGrad)" opacity="0.15"/>
  <!-- Diagonal slash dark outline -->
  <line x1="7" y1="7" x2="25" y2="25" stroke="#062828" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Diagonal slash glass -->
  <line x1="7" y1="7" x2="25" y2="25" stroke="url(#slashGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Glass highlight on ring -->
  <path d="M8,6 A13,13 0 0,1 26,10" fill="none" stroke="url(#unavailShine)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <!-- Sparkle -->
  <circle cx="8.5" cy="6.5" r="0.8" fill="white" opacity="0.85"/>
  <circle cx="24" cy="24" r="0.6" fill="#A8F0F0" opacity="0.5"/>
</svg>
