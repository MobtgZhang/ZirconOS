<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="busyGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A8F0F0"/>
      <stop offset="50%" stop-color="#2ABFBF"/>
      <stop offset="100%" stop-color="#0D5C5C"/>
    </linearGradient>
    <linearGradient id="busyGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0D5C5C" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1A8A8A" stop-opacity="0.8"/>
    </linearGradient>
    <radialGradient id="busyCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A8F0F0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0D5C5C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="busyShine" x1="30%" y1="0%" x2="70%" y2="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="busyGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="blur"/>
      <feFlood flood-color="#2ABFBF" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Center glow -->
  <circle cx="16" cy="16" r="12" fill="url(#busyCenter)"/>
  <!-- Outer ring dark outline -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#062828" stroke-width="2.8"/>
  <!-- Glass outer ring -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="url(#busyGrad1)" stroke-width="2" filter="url(#busyGlow)"/>
  <!-- Spinning sectors -->
  <g filter="url(#busyGlow)">
    <!-- Sector 1 (bright) -->
    <path d="M16,4 A12,12 0 0,1 28,16 L22,16 A6,6 0 0,0 16,10 Z"
          fill="url(#busyGrad1)" opacity="0.9" stroke="#0D5C5C" stroke-width="0.3"/>
    <!-- Sector 2 (medium) -->
    <path d="M28,16 A12,12 0 0,1 16,28 L16,22 A6,6 0 0,0 22,16 Z"
          fill="url(#busyGrad1)" opacity="0.6" stroke="#0D5C5C" stroke-width="0.3"/>
    <!-- Sector 3 (dim) -->
    <path d="M16,28 A12,12 0 0,1 4,16 L10,16 A6,6 0 0,0 16,22 Z"
          fill="url(#busyGrad2)" opacity="0.5" stroke="#0D5C5C" stroke-width="0.3"/>
    <!-- Sector 4 (dimmer) -->
    <path d="M4,16 A12,12 0 0,1 16,4 L16,10 A6,6 0 0,0 10,16 Z"
          fill="url(#busyGrad2)" opacity="0.3" stroke="#0D5C5C" stroke-width="0.3"/>
  </g>
  <!-- Inner circle -->
  <circle cx="16" cy="16" r="5" fill="#0A3D3D" stroke="#062828" stroke-width="0.6"/>
  <circle cx="16" cy="16" r="4" fill="url(#busyGrad1)" opacity="0.7"/>
  <!-- Glass highlight -->
  <ellipse cx="13.5" cy="9.5" rx="5" ry="3.5" fill="url(#busyShine)" opacity="0.5"/>
  <!-- Sparkles -->
  <circle cx="16" cy="4.5" r="0.8" fill="white" opacity="0.9"/>
  <circle cx="27" cy="16" r="0.6" fill="#A8F0F0" opacity="0.7"/>
  <!-- Z crystal mark in center -->
  <text x="16" y="18.5" text-anchor="middle" font-family="'Liberation Sans',sans-serif" font-size="6" font-weight="700" fill="white" opacity="0.8">Z</text>
</svg>
