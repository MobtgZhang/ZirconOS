<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ewGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#A8F0F0"/>
      <stop offset="30%" stop-color="#2ABFBF"/>
      <stop offset="70%" stop-color="#1A8A8A"/>
      <stop offset="100%" stop-color="#0D5C5C"/>
    </linearGradient>
    <linearGradient id="ewShine" x1="0%" y1="30%" x2="50%" y2="70%">
      <stop offset="0%" stop-color="white" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="ewGlow" x="-15%" y="-25%" width="130%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
      <feFlood flood-color="#2ABFBF" flood-opacity="0.45" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark outline -->
  <path d="M1,16 L8,10 L8,13.5 L24,13.5 L24,10 L31,16 L24,22 L24,18.5 L8,18.5 L8,22 Z"
        fill="#0A3D3D" stroke="#062828" stroke-width="0.8" stroke-linejoin="round"/>
  <!-- Glass body -->
  <path d="M2.5,16 L8.5,11 L8.5,14 L23.5,14 L23.5,11 L29.5,16 L23.5,21 L23.5,18 L8.5,18 L8.5,21 Z"
        fill="url(#ewGrad)" filter="url(#ewGlow)" stroke="#0D5C5C" stroke-width="0.3" stroke-linejoin="round"/>
  <!-- Highlight streak -->
  <path d="M4,15 L15,15 L15,16.5 L4,16.5 Z" fill="url(#ewShine)" opacity="0.6"/>
  <!-- Sparkles -->
  <circle cx="3" cy="16" r="0.8" fill="white" opacity="0.85"/>
  <circle cx="29" cy="16" r="0.6" fill="#A8F0F0" opacity="0.6"/>
</svg>
