<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="helpArrowGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#A8F0F0"/>
      <stop offset="30%" stop-color="#2ABFBF"/>
      <stop offset="70%" stop-color="#1A8A8A"/>
      <stop offset="100%" stop-color="#0D5C5C"/>
    </linearGradient>
    <radialGradient id="helpBadgeGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#A8F0F0"/>
      <stop offset="50%" stop-color="#2ABFBF"/>
      <stop offset="100%" stop-color="#0D5C5C"/>
    </radialGradient>
    <linearGradient id="helpShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="helpGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
      <feFlood flood-color="#2ABFBF" flood-opacity="0.45" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Arrow dark outline -->
  <path d="M3,1 L3,21 L7.5,17 L11.5,24 L14.5,22.5 L10.5,15.5 L16,15.5 Z"
        fill="#0A3D3D" stroke="#062828" stroke-width="0.8" stroke-linejoin="round"/>
  <!-- Arrow glass body -->
  <path d="M4,2.5 L4,19.5 L8,16 L12,22.5 L13.5,21.5 L10,15 L15,15 Z"
        fill="url(#helpArrowGrad)" filter="url(#helpGlow)" stroke="#0D5C5C" stroke-width="0.4" stroke-linejoin="round"/>
  <!-- Arrow highlight -->
  <path d="M5,4 L5,14 L6.5,12.5 L6.5,5.5 Z" fill="url(#helpShine)" opacity="0.7"/>
  <!-- Question mark badge circle -->
  <circle cx="24" cy="23" r="7.5" fill="#0A3D3D" stroke="#062828" stroke-width="0.7"/>
  <circle cx="24" cy="23" r="6.5" fill="url(#helpBadgeGrad)" filter="url(#helpGlow)" stroke="#0D5C5C" stroke-width="0.3"/>
  <!-- Glass shine on badge -->
  <ellipse cx="22.5" cy="20.5" rx="3.5" ry="2.5" fill="url(#helpShine)" opacity="0.4"/>
  <!-- Question mark -->
  <text x="24" y="27" text-anchor="middle" font-family="'Liberation Sans',sans-serif" font-size="11" font-weight="700" fill="white" opacity="0.95">?</text>
  <!-- Sparkle -->
  <circle cx="4.5" cy="3" r="0.8" fill="white" opacity="0.9"/>
</svg>
