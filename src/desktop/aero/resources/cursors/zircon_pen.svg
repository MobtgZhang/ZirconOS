<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="penBodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A8F0F0"/>
      <stop offset="30%" stop-color="#2ABFBF"/>
      <stop offset="70%" stop-color="#1A8A8A"/>
      <stop offset="100%" stop-color="#0D5C5C"/>
    </linearGradient>
    <linearGradient id="penTipGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#1A8A8A"/>
      <stop offset="100%" stop-color="#062828"/>
    </linearGradient>
    <linearGradient id="penShine" x1="0%" y1="0%" x2="70%" y2="70%">
      <stop offset="0%" stop-color="white" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="penGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
      <feFlood flood-color="#2ABFBF" flood-opacity="0.45" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Pen dark outline -->
  <g transform="rotate(-45, 16, 16)">
    <!-- Full pen outline -->
    <path d="M13,2 L19,2 L19,22 L16,28 L13,22 Z"
          fill="#0A3D3D" stroke="#062828" stroke-width="0.8" stroke-linejoin="round"/>
  </g>
  <!-- Pen glass body -->
  <g transform="rotate(-45, 16, 16)" filter="url(#penGlow)">
    <!-- Body -->
    <rect x="14" y="3" width="4" height="18" rx="0.5" fill="url(#penBodyGrad)" stroke="#0D5C5C" stroke-width="0.3"/>
    <!-- Tip -->
    <polygon points="14,21 18,21 16,27" fill="url(#penTipGrad)" stroke="#062828" stroke-width="0.3"/>
    <!-- Ferrule band -->
    <rect x="13.5" y="20" width="5" height="1.5" rx="0.3" fill="#1A8A8A" stroke="#0D5C5C" stroke-width="0.2"/>
    <!-- Top cap -->
    <rect x="13.5" y="2.5" width="5" height="2" rx="0.5" fill="#0D5C5C" stroke="#062828" stroke-width="0.2"/>
  </g>
  <!-- Glass highlight -->
  <g transform="rotate(-45, 16, 16)">
    <rect x="14.5" y="4" width="1.2" height="14" rx="0.5" fill="url(#penShine)" opacity="0.65"/>
  </g>
  <!-- Sparkle at tip -->
  <circle cx="6" cy="27" r="1" fill="white" opacity="0.9"/>
  <circle cx="7" cy="26" r="0.5" fill="#A8F0F0" opacity="0.7"/>
  <!-- Dot at writing point -->
  <circle cx="4.5" cy="28.5" r="0.8" fill="#2ABFBF" opacity="0.8"/>
</svg>
