<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="moveGrad" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#A8F0F0"/>
      <stop offset="30%" stop-color="#2ABFBF"/>
      <stop offset="70%" stop-color="#1A8A8A"/>
      <stop offset="100%" stop-color="#0D5C5C"/>
    </linearGradient>
    <radialGradient id="moveGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A8F0F0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0D5C5C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="moveShine" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="moveFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
      <feFlood flood-color="#2ABFBF" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Ambient glow -->
  <circle cx="16" cy="16" r="14" fill="url(#moveGlow)"/>
  <!-- Dark outline -->
  <path d="M16,1 L21,7 L18,7 L18,13 L25,13 L25,10 L31,16 L25,22 L25,19 L18,19 L18,25 L21,25 L16,31 L11,25 L14,25 L14,19 L7,19 L7,22 L1,16 L7,10 L7,13 L14,13 L14,7 L11,7 Z"
        fill="#0A3D3D" stroke="#062828" stroke-width="0.8" stroke-linejoin="round"/>
  <!-- Glass body -->
  <path d="M16,2.5 L20,7.5 L17.5,7.5 L17.5,13.5 L24.5,13.5 L24.5,11 L29.5,16 L24.5,21 L24.5,18.5 L17.5,18.5 L17.5,24.5 L20,24.5 L16,29.5 L12,24.5 L14.5,24.5 L14.5,18.5 L7.5,18.5 L7.5,21 L2.5,16 L7.5,11 L7.5,13.5 L14.5,13.5 L14.5,7.5 L12,7.5 Z"
        fill="url(#moveGrad)" filter="url(#moveFilter)" stroke="#0D5C5C" stroke-width="0.3" stroke-linejoin="round"/>
  <!-- Highlight streak -->
  <path d="M15,4 L17,4 L17,7.5 L15,7.5 Z" fill="url(#moveShine)" opacity="0.5"/>
  <path d="M15,13.5 L17,13.5 L17,18.5 L15,18.5 Z" fill="url(#moveShine)" opacity="0.3"/>
  <!-- Center sparkle -->
  <circle cx="16" cy="16" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="16" cy="3" r="0.7" fill="white" opacity="0.8"/>
</svg>
