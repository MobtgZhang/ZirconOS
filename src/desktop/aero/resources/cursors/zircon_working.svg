<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="workArrowGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#A8F0F0"/>
      <stop offset="30%" stop-color="#2ABFBF"/>
      <stop offset="70%" stop-color="#1A8A8A"/>
      <stop offset="100%" stop-color="#0D5C5C"/>
    </linearGradient>
    <linearGradient id="workSpinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A8F0F0"/>
      <stop offset="50%" stop-color="#2ABFBF"/>
      <stop offset="100%" stop-color="#0D5C5C" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="workShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.65"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="workGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
      <feFlood flood-color="#2ABFBF" flood-opacity="0.45" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Arrow dark outline -->
  <path d="M2,1 L2,20 L6,17 L10,23 L13,21 L9,15 L15,15 Z"
        fill="#0A3D3D" stroke="#062828" stroke-width="0.8" stroke-linejoin="round"/>
  <!-- Arrow glass body -->
  <path d="M3,2.5 L3,18.5 L6.5,16 L10.5,21.5 L12,20.5 L8.5,14.5 L14,14.5 Z"
        fill="url(#workArrowGrad)" filter="url(#workGlow)" stroke="#0D5C5C" stroke-width="0.4" stroke-linejoin="round"/>
  <!-- Arrow highlight -->
  <path d="M4,4 L4,12 L5.5,11 L5.5,5.5 Z" fill="url(#workShine)" opacity="0.7"/>
  <!-- Spinner ring at bottom-right -->
  <circle cx="24" cy="24" r="6" fill="none" stroke="#062828" stroke-width="2"/>
  <circle cx="24" cy="24" r="6" fill="none" stroke="url(#workSpinGrad)" stroke-width="1.5" filter="url(#workGlow)"/>
  <!-- Spinner arc (partial ring to indicate spinning) -->
  <path d="M24,18 A6,6 0 0,1 30,24" fill="none" stroke="#A8F0F0" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
  <path d="M30,24 A6,6 0 0,1 24,30" fill="none" stroke="#2ABFBF" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Spinner center dot -->
  <circle cx="24" cy="24" r="1.5" fill="url(#workSpinGrad)" opacity="0.7"/>
  <!-- Sparkles -->
  <circle cx="3.5" cy="3" r="0.7" fill="white" opacity="0.9"/>
  <circle cx="24" cy="18.5" r="0.6" fill="white" opacity="0.8"/>
</svg>
