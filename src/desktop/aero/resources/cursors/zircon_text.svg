<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="textGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#A8F0F0"/>
      <stop offset="35%" stop-color="#2ABFBF"/>
      <stop offset="70%" stop-color="#1A8A8A"/>
      <stop offset="100%" stop-color="#0D5C5C"/>
    </linearGradient>
    <linearGradient id="textShine" x1="40%" y1="0%" x2="60%" y2="40%">
      <stop offset="0%" stop-color="white" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="textGlow" x="-30%" y="-10%" width="160%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.8" result="blur"/>
      <feFlood flood-color="#2ABFBF" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- I-beam dark outline -->
  <path d="M10,3 L14,3 L14,4.5 L16,6.5 L18,4.5 L18,3 L22,3 L22,5 L20,5 L17.5,7.5 L17.5,15 L20,15 L22,15 L22,17 L18,17 L18,18.5 L20,20.5 L20,24.5 L17.5,24.5 L17.5,27 L22,27 L22,29 L10,29 L10,27 L14.5,27 L14.5,24.5 L12,24.5 L12,20.5 L14,18.5 L14,17 L10,17 L10,15 L12,15 L14.5,15 L14.5,7.5 L12,5 L10,5 Z"
        fill="#0A3D3D" stroke="#062828" stroke-width="0.6" stroke-linejoin="round"/>
  <!-- Glass I-beam body -->
  <g filter="url(#textGlow)">
    <!-- Top serif -->
    <rect x="11" y="3.5" width="10" height="1.5" rx="0.5" fill="url(#textGrad)"/>
    <!-- Bottom serif -->
    <rect x="11" y="27" width="10" height="1.5" rx="0.5" fill="url(#textGrad)"/>
    <!-- Vertical bar -->
    <rect x="15" y="5" width="2" height="22" rx="0.8" fill="url(#textGrad)"/>
    <!-- Middle crossbar -->
    <rect x="12.5" y="15" width="7" height="1.8" rx="0.5" fill="url(#textGrad)"/>
  </g>
  <!-- Highlight streak -->
  <rect x="15.3" y="5" width="0.7" height="12" rx="0.3" fill="url(#textShine)" opacity="0.7"/>
  <!-- Sparkles -->
  <circle cx="16" cy="4" r="0.7" fill="white" opacity="0.8"/>
  <circle cx="16" cy="28" r="0.5" fill="#A8F0F0" opacity="0.6"/>
</svg>
