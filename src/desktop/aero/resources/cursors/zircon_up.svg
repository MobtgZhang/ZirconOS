<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="upGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#A8F0F0"/>
      <stop offset="30%" stop-color="#2ABFBF"/>
      <stop offset="70%" stop-color="#1A8A8A"/>
      <stop offset="100%" stop-color="#0D5C5C"/>
    </linearGradient>
    <linearGradient id="upShine" x1="40%" y1="0%" x2="60%" y2="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="upGlow" x="-25%" y="-20%" width="150%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.1" result="blur"/>
      <feFlood flood-color="#2ABFBF" flood-opacity="0.45" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark outline -->
  <path d="M16,1 L26,14 L20,14 L20,30 L12,30 L12,14 L6,14 Z"
        fill="#0A3D3D" stroke="#062828" stroke-width="0.8" stroke-linejoin="round"/>
  <!-- Glass body -->
  <path d="M16,2.5 L25,13.5 L19.5,13.5 L19.5,29 L12.5,29 L12.5,13.5 L7,13.5 Z"
        fill="url(#upGrad)" filter="url(#upGlow)" stroke="#0D5C5C" stroke-width="0.3" stroke-linejoin="round"/>
  <!-- Highlight streak -->
  <path d="M14,5 L16,2.5 L16,8 L14,10 Z" fill="url(#upShine)" opacity="0.65"/>
  <rect x="13.5" y="13.5" width="1.5" height="12" rx="0.5" fill="url(#upShine)" opacity="0.4"/>
  <!-- Sparkles -->
  <circle cx="16" cy="2.5" r="0.9" fill="white" opacity="0.9"/>
  <circle cx="24" cy="13" r="0.5" fill="#A8F0F0" opacity="0.6"/>
</svg>
