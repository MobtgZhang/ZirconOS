<svg viewBox="0 0 1920 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="oceanSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#061828"/>
      <stop offset="35%" stop-color="#0A2848"/>
      <stop offset="60%" stop-color="#103860"/>
      <stop offset="100%" stop-color="#0C3058"/>
    </linearGradient>

    <radialGradient id="sunGlow" cx="50%" cy="55%" r="40%">
      <stop offset="0%" stop-color="#2090D0" stop-opacity="0.15"/>
      <stop offset="40%" stop-color="#1668B0" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#061828" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="waterSurface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1870A8" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#0A2040" stop-opacity="0.05"/>
    </linearGradient>

    <linearGradient id="rayGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#4DC8E8" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#2090D0" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#061828" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="waveGrad1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1870A8" stop-opacity="0"/>
      <stop offset="25%" stop-color="#2090D0" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#40B0E0" stop-opacity="0.18"/>
      <stop offset="75%" stop-color="#2090D0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#1870A8" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="waveGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ABDC6" stop-opacity="0"/>
      <stop offset="30%" stop-color="#0ABDC6" stop-opacity="0.08"/>
      <stop offset="60%" stop-color="#4DEEEA" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#0ABDC6" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="caustic" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60D0F0" stop-opacity="0.10"/>
      <stop offset="40%" stop-color="#40B0E0" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#40B0E0" stop-opacity="0"/>
    </radialGradient>

    <filter id="waterBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15"/>
    </filter>

    <filter id="rayBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>

    <filter id="gentleBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <rect width="1920" height="1200" fill="url(#oceanSky)"/>
  <rect width="1920" height="1200" fill="url(#sunGlow)"/>

  <!-- Light rays from above -->
  <g filter="url(#rayBlur)" opacity="0.8">
    <path d="M860,0 L920,700 L940,700 L900,0 Z" fill="url(#rayGrad)"/>
    <path d="M1000,0 L1020,650 L1040,650 L1040,0 Z" fill="url(#rayGrad)" opacity="0.7"/>
    <path d="M720,0 L820,750 L840,750 L760,0 Z" fill="url(#rayGrad)" opacity="0.5"/>
    <path d="M1140,0 L1100,680 L1120,680 L1180,0 Z" fill="url(#rayGrad)" opacity="0.5"/>
    <path d="M580,0 L740,800 L755,800 L620,0 Z" fill="url(#rayGrad)" opacity="0.3"/>
    <path d="M1300,0 L1200,720 L1215,720 L1340,0 Z" fill="url(#rayGrad)" opacity="0.3"/>
  </g>

  <!-- Water surface zone -->
  <rect x="0" y="500" width="1920" height="700" fill="url(#waterSurface)"/>

  <!-- Wave layers -->
  <g filter="url(#waterBlur)">
    <path d="M-50,560 C200,520 500,550 800,510 C1100,470 1400,540 1700,500 C1950,470 1970,510 1970,510 L1970,600 C1700,580 1400,610 1100,580 C800,550 500,600 200,570 Z" fill="url(#waveGrad1)" opacity="0.6"/>
    <path d="M-50,620 C300,580 600,610 900,580 C1200,550 1500,600 1800,570 C1970,550 1970,580 1970,580 L1970,670 C1700,660 1350,690 1050,660 C750,630 400,670 100,640 Z" fill="url(#waveGrad2)" opacity="0.5"/>
    <path d="M-50,700 C250,670 550,700 850,670 C1150,640 1450,690 1750,660 C1970,640 1970,670 1970,670 L1970,760 C1700,750 1350,770 1050,750 C750,730 400,760 100,740 Z" fill="url(#waveGrad1)" opacity="0.4"/>
  </g>

  <!-- Sharper wave detail -->
  <g filter="url(#gentleBlur)">
    <path d="M0,550 C180,530 420,548 680,520 C940,492 1180,538 1440,512 C1700,486 1880,520 1920,520 L1920,540 C1720,550 1420,560 1120,545 C820,530 520,556 220,540 Z" fill="url(#waveGrad1)" opacity="0.3"/>
    <path d="M0,630 C220,610 470,625 730,605 C990,585 1230,620 1500,600 C1770,580 1920,608 1920,608 L1920,635 C1720,640 1420,650 1120,638 C820,626 520,645 220,635 Z" fill="url(#waveGrad2)" opacity="0.25"/>
  </g>

  <!-- Caustic light patterns on seabed -->
  <g filter="url(#waterBlur)">
    <ellipse cx="400" cy="900" rx="120" ry="60" fill="url(#caustic)"/>
    <ellipse cx="750" cy="950" rx="100" ry="50" fill="url(#caustic)" opacity="0.8"/>
    <ellipse cx="1100" cy="880" rx="130" ry="65" fill="url(#caustic)"/>
    <ellipse cx="1500" cy="930" rx="110" ry="55" fill="url(#caustic)" opacity="0.7"/>
    <ellipse cx="600" cy="1050" rx="90" ry="45" fill="url(#caustic)" opacity="0.5"/>
    <ellipse cx="1300" cy="1020" rx="100" ry="50" fill="url(#caustic)" opacity="0.6"/>
  </g>

  <!-- Floating particles / plankton -->
  <g opacity="0.5">
    <circle cx="350" cy="620" r="2" fill="#60D0F0" opacity="0.4"/>
    <circle cx="580" cy="680" r="1.5" fill="#40B0E0" opacity="0.3"/>
    <circle cx="820" cy="600" r="2.5" fill="#4DEEEA" opacity="0.35"/>
    <circle cx="1050" cy="660" r="1.8" fill="#60D0F0" opacity="0.3"/>
    <circle cx="1280" cy="590" r="2" fill="#40B0E0" opacity="0.35"/>
    <circle cx="1520" cy="650" r="1.5" fill="#4DEEEA" opacity="0.3"/>
    <circle cx="1750" cy="610" r="2.2" fill="#60D0F0" opacity="0.25"/>
    <circle cx="200" cy="750" r="1.5" fill="#40B0E0" opacity="0.2"/>
    <circle cx="960" cy="780" r="2" fill="#4DEEEA" opacity="0.2"/>
    <circle cx="1600" cy="800" r="1.8" fill="#60D0F0" opacity="0.2"/>
  </g>

  <!-- Surface sparkles -->
  <g opacity="0.7">
    <circle cx="400" cy="530" r="1" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="700" cy="510" r="0.8" fill="#E8F8FF" opacity="0.4"/>
    <circle cx="960" cy="500" r="1.2" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="1250" cy="515" r="0.9" fill="#E8F8FF" opacity="0.4"/>
    <circle cx="1550" cy="505" r="1.1" fill="#FFFFFF" opacity="0.5"/>
  </g>

  <!-- Deep gradient at bottom -->
  <rect x="0" y="1050" width="1920" height="150" fill="#061828" opacity="0.3"/>
</svg>
