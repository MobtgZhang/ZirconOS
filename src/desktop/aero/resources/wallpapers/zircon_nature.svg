<svg viewBox="0 0 1920 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="natBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A0E28"/>
      <stop offset="35%" stop-color="#281840"/>
      <stop offset="70%" stop-color="#302050"/>
      <stop offset="100%" stop-color="#221438"/>
    </linearGradient>

    <radialGradient id="flowerGlow" cx="50%" cy="48%" r="45%">
      <stop offset="0%" stop-color="#8858A0" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#5A3080" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#1A0E28" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="greenAccent" cx="35%" cy="60%" r="30%">
      <stop offset="0%" stop-color="#40A060" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#1A0E28" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="petalGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C880E0" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#8858A0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#1A0E28" stop-opacity="0.02"/>
    </linearGradient>

    <linearGradient id="leafGrad" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#60C880" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#40A060" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#1A0E28" stop-opacity="0.01"/>
    </linearGradient>

    <linearGradient id="vineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#40A060" stop-opacity="0"/>
      <stop offset="30%" stop-color="#60C880" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#80E0A0" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#40A060" stop-opacity="0"/>
    </linearGradient>

    <filter id="petalBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>

    <filter id="softGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>

    <filter id="wideBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <rect width="1920" height="1200" fill="url(#natBg)"/>
  <rect width="1920" height="1200" fill="url(#flowerGlow)"/>
  <rect width="1920" height="1200" fill="url(#greenAccent)"/>

  <!-- Abstract vine/branch curves -->
  <g filter="url(#petalBlur)" opacity="0.5">
    <path d="M-50,500 C200,420 450,460 700,380 C950,300 1200,400 1500,340 C1800,280 1970,350 1970,350 L1970,500 C1700,460 1400,490 1100,450 C800,410 500,470 200,440 Z" fill="url(#vineGrad)"/>
    <path d="M-50,640 C300,570 600,600 900,540 C1200,480 1500,560 1800,510 C1970,490 1970,530 1970,530 L1970,680 C1700,650 1350,690 1050,650 C750,610 400,660 100,630 Z" fill="url(#vineGrad)" opacity="0.7"/>
  </g>

  <!-- Abstract crystal flowers -->
  <g>
    <!-- Large flower - center -->
    <g transform="translate(960, 480)" opacity="0.15">
      <ellipse rx="60" ry="25" fill="url(#petalGrad)" transform="rotate(0)"/>
      <ellipse rx="60" ry="25" fill="url(#petalGrad)" transform="rotate(60)"/>
      <ellipse rx="60" ry="25" fill="url(#petalGrad)" transform="rotate(120)"/>
      <circle r="12" fill="#C880E0" opacity="0.3"/>
    </g>

    <!-- Medium flower - left -->
    <g transform="translate(420, 560)" opacity="0.12">
      <ellipse rx="45" ry="18" fill="url(#petalGrad)" transform="rotate(15)"/>
      <ellipse rx="45" ry="18" fill="url(#petalGrad)" transform="rotate(75)"/>
      <ellipse rx="45" ry="18" fill="url(#petalGrad)" transform="rotate(135)"/>
      <circle r="9" fill="#A868C0" opacity="0.25"/>
    </g>

    <!-- Medium flower - right -->
    <g transform="translate(1450, 520)" opacity="0.12">
      <ellipse rx="50" ry="20" fill="url(#petalGrad)" transform="rotate(-10)"/>
      <ellipse rx="50" ry="20" fill="url(#petalGrad)" transform="rotate(50)"/>
      <ellipse rx="50" ry="20" fill="url(#petalGrad)" transform="rotate(110)"/>
      <circle r="10" fill="#B878D0" opacity="0.25"/>
    </g>

    <!-- Small flowers scattered -->
    <g transform="translate(250, 400)" opacity="0.08">
      <ellipse rx="30" ry="12" fill="url(#petalGrad)" transform="rotate(20)"/>
      <ellipse rx="30" ry="12" fill="url(#petalGrad)" transform="rotate(80)"/>
      <ellipse rx="30" ry="12" fill="url(#petalGrad)" transform="rotate(140)"/>
    </g>
    <g transform="translate(1680, 600)" opacity="0.08">
      <ellipse rx="25" ry="10" fill="url(#petalGrad)" transform="rotate(-15)"/>
      <ellipse rx="25" ry="10" fill="url(#petalGrad)" transform="rotate(45)"/>
      <ellipse rx="25" ry="10" fill="url(#petalGrad)" transform="rotate(105)"/>
    </g>
  </g>

  <!-- Abstract leaf shapes -->
  <g filter="url(#softGlow)" opacity="0.10">
    <path d="M300,700 C330,660 380,650 400,680 C420,710 380,740 340,740 C310,740 290,720 300,700 Z" fill="url(#leafGrad)"/>
    <path d="M800,750 C830,710 880,700 900,730 C920,760 880,790 840,790 C810,790 790,770 800,750 Z" fill="url(#leafGrad)"/>
    <path d="M1300,720 C1330,680 1380,670 1400,700 C1420,730 1380,760 1340,760 C1310,760 1290,740 1300,720 Z" fill="url(#leafGrad)"/>
    <path d="M1700,760 C1730,720 1780,710 1800,740 C1820,770 1780,800 1740,800 C1710,800 1690,780 1700,760 Z" fill="url(#leafGrad)"/>
  </g>

  <!-- Floating pollen/sparkle particles -->
  <g opacity="0.5">
    <circle cx="200" cy="350" r="2" fill="#C880E0" opacity="0.3"/>
    <circle cx="500" cy="300" r="1.5" fill="#80E0A0" opacity="0.25"/>
    <circle cx="750" cy="400" r="2.5" fill="#A868C0" opacity="0.2"/>
    <circle cx="1050" cy="320" r="1.8" fill="#60C880" opacity="0.25"/>
    <circle cx="1350" cy="380" r="2" fill="#C880E0" opacity="0.2"/>
    <circle cx="1600" cy="340" r="1.5" fill="#80E0A0" opacity="0.3"/>
    <circle cx="400" cy="650" r="1.2" fill="#B878D0" opacity="0.2"/>
    <circle cx="1100" cy="620" r="1.5" fill="#60C880" opacity="0.2"/>
    <circle cx="1800" cy="680" r="1" fill="#A868C0" opacity="0.25"/>
  </g>

  <!-- Dewdrop highlights -->
  <g opacity="0.3">
    <circle cx="960" cy="470" r="3" fill="white" opacity="0.15"/>
    <circle cx="420" cy="550" r="2.5" fill="white" opacity="0.12"/>
    <circle cx="1450" cy="510" r="2.5" fill="white" opacity="0.12"/>
  </g>

  <rect x="0" y="1080" width="1920" height="120" fill="#1A0E28" opacity="0.3"/>
</svg>
