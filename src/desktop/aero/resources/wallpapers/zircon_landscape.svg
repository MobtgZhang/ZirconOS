<svg viewBox="0 0 1920 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="40%" stop-color="#1A3050"/>
      <stop offset="70%" stop-color="#204060"/>
      <stop offset="100%" stop-color="#183858"/>
    </linearGradient>

    <radialGradient id="horizonGlow" cx="50%" cy="52%" r="45%">
      <stop offset="0%" stop-color="#2890D0" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#1670B0" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0A1628" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="mountainGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#142840"/>
      <stop offset="100%" stop-color="#0E1E30"/>
    </linearGradient>

    <linearGradient id="mountainGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#182E48"/>
      <stop offset="100%" stop-color="#122438"/>
    </linearGradient>

    <linearGradient id="mountainGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3858"/>
      <stop offset="100%" stop-color="#142840"/>
    </linearGradient>

    <linearGradient id="lakeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1870A8" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#1058A0" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0E2040" stop-opacity="0.05"/>
    </linearGradient>

    <linearGradient id="crystPeak" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#4DEEEA" stop-opacity="0.18"/>
      <stop offset="40%" stop-color="#1CA8C8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#142840" stop-opacity="0.02"/>
    </linearGradient>

    <linearGradient id="crystPeakEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4DEEEA" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0ABDC6" stop-opacity="0.06"/>
    </linearGradient>

    <filter id="mountainBlur" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>

    <filter id="mistBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>

    <filter id="starGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>

    <filter id="edgeGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <rect width="1920" height="1200" fill="url(#skyGrad)"/>
  <rect width="1920" height="1200" fill="url(#horizonGlow)"/>

  <!-- Stars -->
  <g opacity="0.7" filter="url(#starGlow)">
    <circle cx="120" cy="60" r="1.0" fill="#E8F4FF"/>
    <circle cx="350" cy="100" r="0.7" fill="#D0E8FF"/>
    <circle cx="540" cy="40" r="1.3" fill="#FFFFFF"/>
    <circle cx="720" cy="120" r="0.6" fill="#C8E8FF"/>
    <circle cx="960" cy="50" r="1.1" fill="#E8F4FF"/>
    <circle cx="1200" cy="90" r="0.8" fill="#FFFFFF"/>
    <circle cx="1400" cy="60" r="0.9" fill="#D0E8FF"/>
    <circle cx="1600" cy="110" r="1.2" fill="#FFFFFF"/>
    <circle cx="1800" cy="70" r="0.7" fill="#C8E8FF"/>
    <circle cx="200" cy="200" r="0.5" fill="#E0F0FF"/>
    <circle cx="500" cy="220" r="0.6" fill="#D0E8FF"/>
    <circle cx="1100" cy="180" r="0.5" fill="#FFFFFF"/>
    <circle cx="1500" cy="200" r="0.6" fill="#E8F4FF"/>
  </g>

  <!-- Far mountains (darkest, most distant) -->
  <path d="M0,620 L120,560 L280,590 L420,520 L580,560 L700,500 L850,540 L960,480 L1100,530 L1250,490 L1380,540 L1500,500 L1650,530 L1800,490 L1920,540 L1920,700 L0,700 Z" fill="url(#mountainGrad1)" opacity="0.7"/>

  <!-- Mid mountains -->
  <path d="M0,680 L150,620 L300,650 L480,580 L640,630 L780,570 L960,540 L1100,590 L1250,550 L1400,600 L1550,560 L1700,590 L1850,550 L1920,580 L1920,760 L0,760 Z" fill="url(#mountainGrad2)" opacity="0.8"/>

  <!-- Crystal peaks on mid mountains -->
  <g>
    <polygon points="960,540 1010,470 1050,540" fill="url(#crystPeak)" stroke="url(#crystPeakEdge)" stroke-width="0.5"/>
    <polygon points="480,580 520,520 550,580" fill="url(#crystPeak)" stroke="url(#crystPeakEdge)" stroke-width="0.5" opacity="0.7"/>
    <polygon points="1400,600 1430,550 1460,600" fill="url(#crystPeak)" stroke="url(#crystPeakEdge)" stroke-width="0.5" opacity="0.6"/>
  </g>

  <!-- Near mountains (closest) -->
  <path d="M0,740 L180,680 L350,710 L520,660 L700,700 L860,650 L1020,690 L1200,640 L1380,680 L1540,650 L1700,690 L1860,660 L1920,680 L1920,820 L0,820 Z" fill="url(#mountainGrad3)"/>

  <!-- Mist between mountains -->
  <g filter="url(#mistBlur)">
    <rect x="0" y="640" width="1920" height="100" fill="#2890D0" opacity="0.04"/>
    <rect x="0" y="720" width="1920" height="80" fill="#0ABDC6" opacity="0.03"/>
  </g>

  <!-- Lake surface -->
  <rect x="0" y="800" width="1920" height="400" fill="url(#lakeGrad)"/>

  <!-- Lake reflections of crystal peaks -->
  <g opacity="0.15" transform="translate(0,1600) scale(1,-1)">
    <polygon points="960,540 1010,470 1050,540" fill="url(#crystPeak)"/>
    <polygon points="480,580 520,520 550,580" fill="url(#crystPeak)" opacity="0.7"/>
    <polygon points="1400,600 1430,550 1460,600" fill="url(#crystPeak)" opacity="0.6"/>
  </g>

  <!-- Lake surface ripples -->
  <g filter="url(#edgeGlow)" opacity="0.08">
    <line x1="200" y1="850" x2="600" y2="850" stroke="#4DEEEA" stroke-width="0.8"/>
    <line x1="800" y1="870" x2="1200" y2="870" stroke="#2890D0" stroke-width="0.8"/>
    <line x1="1400" y1="855" x2="1750" y2="855" stroke="#4DEEEA" stroke-width="0.8"/>
    <line x1="100" y1="900" x2="500" y2="900" stroke="#2890D0" stroke-width="0.6"/>
    <line x1="700" y1="920" x2="1100" y2="920" stroke="#4DEEEA" stroke-width="0.6"/>
    <line x1="1300" y1="910" x2="1800" y2="910" stroke="#2890D0" stroke-width="0.6"/>
  </g>

  <!-- Foreground grass silhouettes -->
  <g opacity="0.3">
    <path d="M0,1150 C50,1120 60,1140 80,1100 L85,1200 L0,1200 Z" fill="#0E1E30"/>
    <path d="M100,1150 C120,1110 140,1130 150,1090 L155,1200 L95,1200 Z" fill="#0E1E30"/>
    <path d="M1760,1140 C1780,1100 1800,1120 1820,1080 L1825,1200 L1755,1200 Z" fill="#0E1E30"/>
    <path d="M1860,1150 C1880,1115 1900,1130 1920,1095 L1920,1200 L1855,1200 Z" fill="#0E1E30"/>
  </g>

  <!-- Bottom gradient -->
  <rect x="0" y="1100" width="1920" height="100" fill="#0A1628" opacity="0.3"/>
</svg>
