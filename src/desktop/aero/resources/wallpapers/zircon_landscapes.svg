<svg viewBox="0 0 1920 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lndBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#181818"/>
      <stop offset="35%" stop-color="#2A2A2A"/>
      <stop offset="70%" stop-color="#303030"/>
      <stop offset="100%" stop-color="#222222"/>
    </linearGradient>

    <radialGradient id="fogCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#505050" stop-opacity="0.10"/>
      <stop offset="50%" stop-color="#404040" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#181818" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="hillGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#1E1E1E"/>
    </linearGradient>

    <linearGradient id="hillGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#343434"/>
      <stop offset="100%" stop-color="#282828"/>
    </linearGradient>

    <linearGradient id="hillGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3C3C3C"/>
      <stop offset="100%" stop-color="#303030"/>
    </linearGradient>

    <linearGradient id="silverLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#808080" stop-opacity="0"/>
      <stop offset="25%" stop-color="#A0A0A0" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#C0C0C0" stop-opacity="0.12"/>
      <stop offset="75%" stop-color="#A0A0A0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#808080" stop-opacity="0"/>
    </linearGradient>

    <filter id="fogBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>

    <filter id="gentleBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <rect width="1920" height="1200" fill="url(#lndBg)"/>
  <rect width="1920" height="1200" fill="url(#fogCenter)"/>

  <!-- Far rolling hills -->
  <path d="M0,580 C200,540 400,560 600,520 C800,480 1000,540 1200,500 C1400,460 1600,520 1800,490 L1920,510 L1920,660 L0,660 Z" fill="url(#hillGrad1)" opacity="0.6"/>

  <!-- Silver highlight on far ridge -->
  <g filter="url(#gentleBlur)" opacity="0.06">
    <path d="M0,580 C200,540 400,560 600,520 C800,480 1000,540 1200,500 C1400,460 1600,520 1800,490 L1920,510" fill="none" stroke="#C0C0C0" stroke-width="2"/>
  </g>

  <!-- Mid hills -->
  <path d="M0,640 C250,600 450,620 700,580 C950,540 1150,610 1400,570 C1650,530 1800,580 1920,560 L1920,740 L0,740 Z" fill="url(#hillGrad2)" opacity="0.7"/>

  <!-- Fog layer -->
  <g filter="url(#fogBlur)">
    <rect x="0" y="600" width="1920" height="80" fill="#606060" opacity="0.04"/>
    <rect x="0" y="700" width="1920" height="60" fill="#505050" opacity="0.03"/>
  </g>

  <!-- Near hills -->
  <path d="M0,720 C200,690 400,710 650,670 C900,630 1100,700 1350,660 C1600,620 1750,680 1920,650 L1920,820 L0,820 Z" fill="url(#hillGrad3)" opacity="0.8"/>

  <!-- Meadow -->
  <rect x="0" y="800" width="1920" height="400" fill="#282828"/>

  <!-- Silver stream -->
  <g filter="url(#gentleBlur)">
    <path d="M-50,900 C200,890 400,910 600,895 C800,880 1000,905 1200,890 C1400,875 1600,900 1920,885" fill="none" stroke="url(#silverLine)" stroke-width="3"/>
    <path d="M-50,920 C200,912 400,928 600,915 C800,902 1000,922 1200,910 C1400,898 1600,918 1920,908" fill="none" stroke="url(#silverLine)" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Lone tree silhouettes -->
  <g opacity="0.15">
    <!-- Tree 1 -->
    <rect x="648" y="730" width="4" height="70" fill="#1E1E1E"/>
    <ellipse cx="650" cy="720" rx="25" ry="30" fill="#222222"/>

    <!-- Tree 2 -->
    <rect x="1298" y="710" width="4" height="80" fill="#1E1E1E"/>
    <ellipse cx="1300" cy="700" rx="28" ry="32" fill="#222222"/>

    <!-- Tree 3 (distant) -->
    <rect x="398" y="660" width="3" height="50" fill="#2A2A2A"/>
    <ellipse cx="400" cy="655" rx="18" ry="22" fill="#2A2A2A"/>
  </g>

  <!-- Atmospheric particles -->
  <g opacity="0.3">
    <circle cx="300" cy="620" r="1.5" fill="#808080" opacity="0.2"/>
    <circle cx="600" cy="580" r="1" fill="#909090" opacity="0.15"/>
    <circle cx="960" cy="600" r="1.8" fill="#808080" opacity="0.2"/>
    <circle cx="1300" cy="570" r="1.2" fill="#909090" opacity="0.15"/>
    <circle cx="1650" cy="610" r="1.5" fill="#808080" opacity="0.2"/>
  </g>

  <rect x="0" y="1080" width="1920" height="120" fill="#181818" opacity="0.3"/>
</svg>
