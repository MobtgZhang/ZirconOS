<svg viewBox="0 0 1920 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="archBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0820"/>
      <stop offset="40%" stop-color="#141038"/>
      <stop offset="75%" stop-color="#1A1448"/>
      <stop offset="100%" stop-color="#100C30"/>
    </linearGradient>

    <radialGradient id="blueGlow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#2040A0" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#1830A0" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0A0820" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="glassWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3060C0" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#2048A0" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0A0820" stop-opacity="0.02"/>
    </linearGradient>

    <linearGradient id="steelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#606880" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#404850" stop-opacity="0.04"/>
    </linearGradient>

    <linearGradient id="windowGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4080D0" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#2050A0" stop-opacity="0.08"/>
    </linearGradient>

    <linearGradient id="gridLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4080D0" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4080D0" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#4080D0" stop-opacity="0"/>
    </linearGradient>

    <filter id="glassBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>

    <filter id="wideGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="15"/>
    </filter>

    <filter id="lineGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="1920" height="1200" fill="url(#archBg)"/>
  <rect width="1920" height="1200" fill="url(#blueGlow)"/>

  <!-- Abstract building left -->
  <g opacity="0.7">
    <rect x="100" y="200" width="300" height="800" fill="url(#glassWall)"/>
    <rect x="100" y="200" width="300" height="800" fill="none" stroke="#3060C0" stroke-width="0.5" stroke-opacity="0.15"/>
    <!-- Window grid -->
    <g stroke="#4080D0" stroke-width="0.3" stroke-opacity="0.12">
      <line x1="100" y1="280" x2="400" y2="280"/>
      <line x1="100" y1="360" x2="400" y2="360"/>
      <line x1="100" y1="440" x2="400" y2="440"/>
      <line x1="100" y1="520" x2="400" y2="520"/>
      <line x1="100" y1="600" x2="400" y2="600"/>
      <line x1="100" y1="680" x2="400" y2="680"/>
      <line x1="100" y1="760" x2="400" y2="760"/>
      <line x1="100" y1="840" x2="400" y2="840"/>
      <line x1="100" y1="920" x2="400" y2="920"/>
      <line x1="200" y1="200" x2="200" y2="1000"/>
      <line x1="300" y1="200" x2="300" y2="1000"/>
    </g>
    <!-- Lit windows -->
    <g filter="url(#glassBlur)">
      <rect x="110" y="290" width="80" height="60" fill="url(#windowGlow)" opacity="0.6"/>
      <rect x="210" y="450" width="80" height="60" fill="url(#windowGlow)" opacity="0.4"/>
      <rect x="310" y="370" width="80" height="60" fill="url(#windowGlow)" opacity="0.5"/>
      <rect x="110" y="610" width="80" height="60" fill="url(#windowGlow)" opacity="0.3"/>
      <rect x="310" y="690" width="80" height="60" fill="url(#windowGlow)" opacity="0.4"/>
    </g>
  </g>

  <!-- Central tower -->
  <g opacity="0.8">
    <rect x="700" y="80" width="260" height="920" fill="url(#glassWall)"/>
    <rect x="700" y="80" width="260" height="920" fill="none" stroke="#3060C0" stroke-width="0.5" stroke-opacity="0.15"/>
    <g stroke="#4080D0" stroke-width="0.3" stroke-opacity="0.10">
      <line x1="700" y1="160" x2="960" y2="160"/>
      <line x1="700" y1="240" x2="960" y2="240"/>
      <line x1="700" y1="320" x2="960" y2="320"/>
      <line x1="700" y1="400" x2="960" y2="400"/>
      <line x1="700" y1="480" x2="960" y2="480"/>
      <line x1="700" y1="560" x2="960" y2="560"/>
      <line x1="700" y1="640" x2="960" y2="640"/>
      <line x1="700" y1="720" x2="960" y2="720"/>
      <line x1="700" y1="800" x2="960" y2="800"/>
      <line x1="700" y1="880" x2="960" y2="880"/>
      <line x1="700" y1="960" x2="960" y2="960"/>
      <line x1="790" y1="80" x2="790" y2="1000"/>
      <line x1="870" y1="80" x2="870" y2="1000"/>
    </g>
    <g filter="url(#glassBlur)">
      <rect x="710" y="170" width="70" height="60" fill="url(#windowGlow)" opacity="0.5"/>
      <rect x="800" y="330" width="60" height="60" fill="url(#windowGlow)" opacity="0.6"/>
      <rect x="880" y="250" width="70" height="60" fill="url(#windowGlow)" opacity="0.4"/>
      <rect x="710" y="490" width="70" height="60" fill="url(#windowGlow)" opacity="0.5"/>
      <rect x="800" y="650" width="60" height="60" fill="url(#windowGlow)" opacity="0.4"/>
      <rect x="880" y="570" width="70" height="60" fill="url(#windowGlow)" opacity="0.3"/>
      <rect x="710" y="810" width="70" height="60" fill="url(#windowGlow)" opacity="0.3"/>
      <rect x="880" y="890" width="70" height="60" fill="url(#windowGlow)" opacity="0.4"/>
    </g>
  </g>

  <!-- Right building cluster -->
  <g opacity="0.7">
    <rect x="1200" y="300" width="220" height="700" fill="url(#glassWall)"/>
    <rect x="1200" y="300" width="220" height="700" fill="none" stroke="#3060C0" stroke-width="0.5" stroke-opacity="0.15"/>
    <g stroke="#4080D0" stroke-width="0.3" stroke-opacity="0.10">
      <line x1="1200" y1="380" x2="1420" y2="380"/>
      <line x1="1200" y1="460" x2="1420" y2="460"/>
      <line x1="1200" y1="540" x2="1420" y2="540"/>
      <line x1="1200" y1="620" x2="1420" y2="620"/>
      <line x1="1200" y1="700" x2="1420" y2="700"/>
      <line x1="1200" y1="780" x2="1420" y2="780"/>
      <line x1="1200" y1="860" x2="1420" y2="860"/>
      <line x1="1200" y1="940" x2="1420" y2="940"/>
      <line x1="1310" y1="300" x2="1310" y2="1000"/>
    </g>
    <g filter="url(#glassBlur)">
      <rect x="1210" y="390" width="90" height="60" fill="url(#windowGlow)" opacity="0.5"/>
      <rect x="1320" y="550" width="90" height="60" fill="url(#windowGlow)" opacity="0.4"/>
      <rect x="1210" y="710" width="90" height="60" fill="url(#windowGlow)" opacity="0.3"/>
      <rect x="1320" y="870" width="90" height="60" fill="url(#windowGlow)" opacity="0.4"/>
    </g>
  </g>

  <!-- Far right narrow tower -->
  <g opacity="0.5">
    <rect x="1600" y="250" width="140" height="750" fill="url(#steelGrad)"/>
    <rect x="1600" y="250" width="140" height="750" fill="none" stroke="#4080D0" stroke-width="0.3" stroke-opacity="0.10"/>
    <g stroke="#4080D0" stroke-width="0.2" stroke-opacity="0.08">
      <line x1="1600" y1="340" x2="1740" y2="340"/>
      <line x1="1600" y1="430" x2="1740" y2="430"/>
      <line x1="1600" y1="520" x2="1740" y2="520"/>
      <line x1="1600" y1="610" x2="1740" y2="610"/>
      <line x1="1600" y1="700" x2="1740" y2="700"/>
      <line x1="1600" y1="790" x2="1740" y2="790"/>
      <line x1="1600" y1="880" x2="1740" y2="880"/>
      <line x1="1670" y1="250" x2="1670" y2="1000"/>
    </g>
  </g>

  <!-- Ground plane reflection -->
  <rect x="0" y="1000" width="1920" height="200" fill="#100C30" opacity="0.5"/>
  <g filter="url(#wideGlow)" opacity="0.05">
    <rect x="700" y="1000" width="260" height="120" fill="#4080D0"/>
    <rect x="100" y="1000" width="300" height="80" fill="#3060C0"/>
    <rect x="1200" y="1000" width="220" height="100" fill="#3060C0"/>
  </g>

  <!-- Sky accent particles -->
  <g opacity="0.5">
    <circle cx="500" cy="150" r="1.5" fill="#6090D0" opacity="0.25"/>
    <circle cx="1050" cy="120" r="1" fill="#4080D0" opacity="0.20"/>
    <circle cx="1500" cy="180" r="1.2" fill="#6090D0" opacity="0.20"/>
    <circle cx="300" cy="350" r="1" fill="#4080D0" opacity="0.15"/>
    <circle cx="1800" cy="400" r="1.5" fill="#6090D0" opacity="0.15"/>
  </g>
</svg>
