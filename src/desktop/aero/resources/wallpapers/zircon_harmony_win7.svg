<svg viewBox="0 0 1920 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Win7 "Harmony"-style deep blue atmosphere (original homage, not a Microsoft asset) -->
    <linearGradient id="skyDeep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1E3D"/>
      <stop offset="35%" stop-color="#102E55"/>
      <stop offset="70%" stop-color="#143A68"/>
      <stop offset="100%" stop-color="#081830"/>
    </linearGradient>
    <radialGradient id="centerBloom" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#2A78C8" stop-opacity="0.35"/>
      <stop offset="45%" stop-color="#1A5088" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0A1E3D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="logoGlow" cx="50%" cy="42%" r="25%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="70%" stop-color="#60A0E8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#143A68" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="streakL" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="40%" stop-color="#88C8FF" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="wide" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="42"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000510" stop-opacity="0.35"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1200" fill="url(#skyDeep)"/>
  <rect width="1920" height="1200" fill="url(#centerBloom)"/>

  <!-- Organic light ribbons (Aero desktop streaks) -->
  <g opacity="0.55" filter="url(#soft)">
    <path d="M-80,180 Q480,80 960,220 T2000,140" fill="none" stroke="#6AB0F0" stroke-width="3" stroke-opacity="0.12"/>
    <path d="M-40,420 Q520,300 980,460 T2040,380" fill="none" stroke="#4080C8" stroke-width="2.5" stroke-opacity="0.10"/>
    <path d="M0,780 Q600,680 1100,820 T1960,760" fill="none" stroke="#5090D8" stroke-width="2" stroke-opacity="0.08"/>
  </g>

  <!-- Floating translucent shapes -->
  <ellipse cx="320" cy="280" rx="180" ry="90" fill="#1E5090" opacity="0.06" filter="url(#wide)"/>
  <ellipse cx="1580" cy="340" rx="220" ry="100" fill="#2058A0" opacity="0.05" filter="url(#wide)"/>
  <ellipse cx="1180" cy="900" rx="260" ry="70" fill="#183060" opacity="0.07" filter="url(#wide)"/>

  <!-- Central four-pane "window" motif (four Windows logo colors, stylized) -->
  <g transform="translate(960, 460)">
    <ellipse rx="200" ry="120" fill="url(#logoGlow)"/>
    <!-- Orange -->
    <path d="M-8,-96 C-96,-88 -120,8 -72,56 L-8,8 Z" fill="#E87828" opacity="0.92"/>
    <!-- Green -->
    <path d="M8,-96 C96,-88 120,8 72,56 L8,8 Z" fill="#5CB85C" opacity="0.92"/>
    <!-- Blue -->
    <path d="M-8,96 C-96,88 -120,-8 -72,-56 L-8,-8 Z" fill="#3A8FD8" opacity="0.95"/>
    <!-- Yellow -->
    <path d="M8,96 C96,88 120,-8 72,-56 L8,-8 Z" fill="#E8C830" opacity="0.92"/>
    <!-- Inner cross sheen -->
    <path d="M-4,-112 L4,-112 L4,112 L-4,112 Z" fill="#FFFFFF" opacity="0.08"/>
    <path d="M-112,-4 L112,-4 L112,4 L-112,4 Z" fill="#FFFFFF" opacity="0.08"/>
  </g>

  <!-- Diagonal light wash -->
  <rect width="1920" height="1200" fill="url(#streakL)" opacity="0.4"/>

  <rect width="1920" height="1200" fill="url(#vignette)"/>
</svg>
