<svg viewBox="0 0 1920 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgMain" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#0F2847"/>
      <stop offset="40%" stop-color="#163560"/>
      <stop offset="75%" stop-color="#1A4070"/>
      <stop offset="100%" stop-color="#0E2640"/>
    </linearGradient>

    <radialGradient id="centerGlow" cx="50%" cy="42%" r="45%">
      <stop offset="0%" stop-color="#2680C8" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#1667B0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0F2847" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="warmAccent" cx="55%" cy="55%" r="30%">
      <stop offset="0%" stop-color="#F7A41D" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#0F2847" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="crystBody" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#4DEEEA" stop-opacity="0.20"/>
      <stop offset="40%" stop-color="#1CA8C8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0F2847" stop-opacity="0.02"/>
    </linearGradient>

    <linearGradient id="crystFace" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7CC8F0" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#163560" stop-opacity="0.02"/>
    </linearGradient>

    <linearGradient id="crystDark" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0ABDC6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0E2640" stop-opacity="0.01"/>
    </linearGradient>

    <linearGradient id="crystEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4DEEEA" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#1667B0" stop-opacity="0.06"/>
    </linearGradient>

    <linearGradient id="beamGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4DEEEA" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0F2847" stop-opacity="0"/>
    </linearGradient>

    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>

    <filter id="wideBlur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>

    <filter id="edgeGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>

    <filter id="starGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <rect width="1920" height="1200" fill="url(#bgMain)"/>
  <rect width="1920" height="1200" fill="url(#centerGlow)"/>
  <rect width="1920" height="1200" fill="url(#warmAccent)"/>

  <!-- Central hero crystal -->
  <g>
    <polygon points="960,200 1120,340 1100,600 960,700 820,600 800,340"
      fill="url(#crystBody)" stroke="url(#crystEdge)" stroke-width="0.8"/>
    <polygon points="960,200 1120,340 1100,600 960,700"
      fill="url(#crystFace)" opacity="0.5"/>
    <polygon points="960,200 800,340 820,600 960,700"
      fill="url(#crystDark)" opacity="0.4"/>
    <line x1="960" y1="200" x2="960" y2="700" stroke="#4DEEEA" stroke-width="0.6" opacity="0.15"/>
    <line x1="960" y1="200" x2="1100" y2="600" stroke="#7CC8F0" stroke-width="0.4" opacity="0.10"/>
    <line x1="960" y1="200" x2="820" y2="600" stroke="#7CC8F0" stroke-width="0.4" opacity="0.10"/>
  </g>

  <!-- Crystal inner glow -->
  <ellipse cx="960" cy="450" rx="120" ry="200" fill="#0ABDC6" opacity="0.04" filter="url(#wideBlur)"/>

  <!-- Side crystals -->
  <g>
    <polygon points="380,380 500,300 540,460 480,580 400,560"
      fill="url(#crystDark)" stroke="url(#crystEdge)" stroke-width="0.6"/>
    <polygon points="500,300 540,460 480,580" fill="url(#crystBody)" opacity="0.35"/>
  </g>

  <g>
    <polygon points="1440,350 1560,280 1600,430 1540,560 1460,540"
      fill="url(#crystFace)" stroke="url(#crystEdge)" stroke-width="0.6"/>
    <polygon points="1560,280 1600,430 1540,560" fill="url(#crystDark)" opacity="0.35"/>
  </g>

  <!-- Smaller floating crystals -->
  <g opacity="0.5">
    <polygon points="240,560 280,520 310,570 290,620 250,610"
      fill="url(#crystBody)" stroke="url(#crystEdge)" stroke-width="0.4"/>
    <polygon points="1700,500 1730,470 1760,510 1740,550 1710,545"
      fill="url(#crystFace)" stroke="url(#crystEdge)" stroke-width="0.4"/>
    <polygon points="700,750 720,730 740,760 730,790 710,785"
      fill="url(#crystDark)" stroke="url(#crystEdge)" stroke-width="0.3"/>
    <polygon points="1250,720 1270,700 1290,730 1280,760 1260,755"
      fill="url(#crystBody)" stroke="url(#crystEdge)" stroke-width="0.3"/>
  </g>

  <!-- Light beams from central crystal -->
  <g filter="url(#softBlur)" opacity="0.10">
    <path d="M960,200 L700,0 L720,0 Z" fill="#4DEEEA"/>
    <path d="M960,200 L1220,0 L1240,0 Z" fill="#7CC8F0"/>
    <path d="M960,700 L600,1200 L620,1200 Z" fill="#0ABDC6"/>
    <path d="M960,700 L1320,1200 L1340,1200 Z" fill="#1667B0"/>
  </g>

  <!-- Refraction lines -->
  <g filter="url(#edgeGlow)" opacity="0.08">
    <line x1="960" y1="200" x2="300" y2="800" stroke="#4DEEEA" stroke-width="1.2"/>
    <line x1="960" y1="200" x2="1650" y2="750" stroke="#7CC8F0" stroke-width="1"/>
    <line x1="960" y1="700" x2="200" y2="1100" stroke="#0ABDC6" stroke-width="0.8"/>
    <line x1="960" y1="700" x2="1750" y2="1050" stroke="#1CA8C8" stroke-width="0.8"/>
  </g>

  <!-- Ambient particles -->
  <g opacity="0.6" filter="url(#starGlow)">
    <circle cx="180" cy="120" r="1.2" fill="#E8F4FF"/>
    <circle cx="420" cy="80" r="0.9" fill="#C8E8FF"/>
    <circle cx="650" cy="150" r="1.4" fill="#FFFFFF"/>
    <circle cx="890" cy="100" r="0.8" fill="#D0E8FF"/>
    <circle cx="1100" cy="60" r="1.1" fill="#E8F4FF"/>
    <circle cx="1350" cy="130" r="0.7" fill="#C8E8FF"/>
    <circle cx="1580" cy="90" r="1.3" fill="#FFFFFF"/>
    <circle cx="1800" cy="160" r="0.9" fill="#D0E8FF"/>
    <circle cx="300" cy="250" r="0.6" fill="#E0F0FF"/>
    <circle cx="560" cy="280" r="0.8" fill="#C8E8FF"/>
    <circle cx="1200" cy="230" r="0.7" fill="#FFFFFF"/>
    <circle cx="1650" cy="270" r="0.5" fill="#E8F4FF"/>
  </g>

  <!-- Z watermark -->
  <g transform="translate(1850, 1140)" opacity="0.05">
    <polygon points="0,-30 22,-44 44,-30 44,0 22,14 0,0" fill="#4DEEEA" stroke="#4DEEEA" stroke-width="0.5" stroke-opacity="0.3"/>
    <line x1="12" y1="-26" x2="32" y2="-26" stroke="#4DEEEA" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="32" y1="-26" x2="12" y2="-4" stroke="#4DEEEA" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="12" y1="-4" x2="32" y2="-4" stroke="#4DEEEA" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Horizon glow -->
  <ellipse cx="960" cy="900" rx="700" ry="100" fill="#1667B0" opacity="0.03" filter="url(#wideBlur)"/>
</svg>
