<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orbGrad" x1="30%" y1="10%" x2="70%" y2="90%">
      <stop offset="0%" stop-color="#7CC8F0"/>
      <stop offset="35%" stop-color="#3FA3D8"/>
      <stop offset="70%" stop-color="#1667B0"/>
      <stop offset="100%" stop-color="#0A3A6A"/>
    </linearGradient>
    <linearGradient id="orbShine" x1="30%" y1="0%" x2="60%" y2="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glassGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#A8D8F0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1667B0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D0EEFF"/>
      <stop offset="50%" stop-color="#5BC2F0"/>
      <stop offset="100%" stop-color="#2A8FD4"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="outerGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Ambient glow -->
  <circle cx="128" cy="118" r="100" fill="url(#glassGlow)"/>

  <!-- Outer ring (glass effect) -->
  <circle cx="128" cy="118" r="72" fill="none" stroke="url(#ringGrad)" stroke-width="3" opacity="0.7" filter="url(#outerGlow)"/>

  <!-- Main orb body -->
  <circle cx="128" cy="118" r="60" fill="url(#orbGrad)" filter="url(#softShadow)"/>

  <!-- Glass shine overlay -->
  <ellipse cx="118" cy="98" rx="38" ry="28" fill="url(#orbShine)"/>

  <!-- Zircon 'Z' crystal facet -->
  <g filter="url(#softShadow)">
    <!-- Shadow Z -->
    <line x1="104" y1="96" x2="152" y2="96" stroke="#0A2A50" stroke-width="7" stroke-linecap="round"/>
    <line x1="152" y1="96" x2="104" y2="140" stroke="#0A2A50" stroke-width="7" stroke-linecap="round"/>
    <line x1="104" y1="140" x2="152" y2="140" stroke="#0A2A50" stroke-width="7" stroke-linecap="round"/>
    <!-- Bright Z -->
    <line x1="103" y1="95" x2="151" y2="95" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="151" y1="95" x2="103" y2="139" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="103" y1="139" x2="151" y2="139" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- Sparkle accents -->
  <circle cx="164" cy="82" r="3" fill="white" opacity="0.85"/>
  <circle cx="88" cy="150" r="2.5" fill="#5BC2F0" opacity="0.7"/>
  <circle cx="170" cy="148" r="2" fill="#F7A41D" opacity="0.6"/>

  <!-- Bottom reflection line -->
  <ellipse cx="128" cy="178" rx="48" ry="4" fill="#1667B0" opacity="0.15"/>

  <!-- Text -->
  <text x="128" y="210" text-anchor="middle" font-family="'Liberation Sans', system-ui, sans-serif" font-size="20" font-weight="600" letter-spacing="3" fill="#7CC8F0">ZirconOS</text>
  <text x="128" y="228" text-anchor="middle" font-family="'Liberation Sans', system-ui, sans-serif" font-size="9" font-weight="400" letter-spacing="2" fill="#5BC2F0" opacity="0.6">AERO GLASS</text>
</svg>
