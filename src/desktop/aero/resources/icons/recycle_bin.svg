<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="binBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A8A8A" stop-opacity="0.6"/>
      <stop offset="30%" stop-color="#2ABFBF" stop-opacity="0.45"/>
      <stop offset="70%" stop-color="#2ABFBF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#1A8A8A" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="binLid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A8F0F0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1A8A8A" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="binHL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="binShadow">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#0D5C5C" flood-opacity="0.35"/>
    </filter>
    <filter id="recycleGlow">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Crystal facet pattern -->
    <pattern id="facets" x="0" y="0" width="8" height="10" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="8" y2="10" stroke="#A8F0F0" stroke-opacity="0.08" stroke-width="0.4"/>
      <line x1="8" y1="0" x2="0" y2="10" stroke="#A8F0F0" stroke-opacity="0.08" stroke-width="0.4"/>
    </pattern>
  </defs>
  <!-- Bin body (tapered cylinder) -->
  <path d="M13 16 L11 40 Q11 44 16 44 L32 44 Q37 44 37 40 L35 16 Z" fill="url(#binBody)" filter="url(#binShadow)"/>
  <!-- Crystal facet overlay -->
  <path d="M13 16 L11 40 Q11 44 16 44 L32 44 Q37 44 37 40 L35 16 Z" fill="url(#facets)"/>
  <!-- Glass highlight on body -->
  <path d="M13 16 L12 30 Q18 20 20 30 L20 16 Z" fill="url(#binHL)"/>
  <!-- Vertical ridges -->
  <line x1="19" y1="16" x2="18" y2="44" stroke="#0D5C5C" stroke-opacity="0.15" stroke-width="0.5"/>
  <line x1="24" y1="16" x2="24" y2="44" stroke="#0D5C5C" stroke-opacity="0.15" stroke-width="0.5"/>
  <line x1="29" y1="16" x2="30" y2="44" stroke="#0D5C5C" stroke-opacity="0.15" stroke-width="0.5"/>
  <!-- Lid -->
  <rect x="10" y="12" width="28" height="4" rx="1.5" ry="1.5" fill="url(#binLid)"/>
  <!-- Lid handle -->
  <rect x="20" y="8" width="8" height="4" rx="2" ry="2" fill="url(#binLid)"/>
  <!-- Recycle symbol -->
  <g transform="translate(24,30)" filter="url(#recycleGlow)">
    <path d="M0 -6 L-3 0 L3 0 Z" fill="none" stroke="#2ABFBF" stroke-width="1.2" stroke-linejoin="round"/>
    <path d="M-5 2 L-2 -1 L1 5 Z" fill="none" stroke="#2ABFBF" stroke-width="1.2" stroke-linejoin="round" transform="rotate(120 0 0)"/>
    <path d="M5 2 L2 -1 L-1 5 Z" fill="none" stroke="#2ABFBF" stroke-width="1.2" stroke-linejoin="round" transform="rotate(240 0 0)"/>
    <!-- Arrows on recycling symbol -->
    <polygon points="-1,-6.5 0,-8 1,-6.5" fill="#2ABFBF"/>
    <polygon points="-1,-6.5 0,-8 1,-6.5" fill="#2ABFBF" transform="rotate(120 0 0)"/>
    <polygon points="-1,-6.5 0,-8 1,-6.5" fill="#2ABFBF" transform="rotate(240 0 0)"/>
  </g>
</svg>
