<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="lockBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A8F0F0" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#2ABFBF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0D5C5C" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="shackleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A8A8A"/>
      <stop offset="30%" stop-color="#2ABFBF"/>
      <stop offset="70%" stop-color="#2ABFBF"/>
      <stop offset="100%" stop-color="#1A8A8A"/>
    </linearGradient>
    <linearGradient id="lockHL" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="keyholeGrad" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#0D5C5C"/>
      <stop offset="100%" stop-color="#061E1E"/>
    </radialGradient>
    <filter id="lockShadow">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#0D5C5C" flood-opacity="0.35"/>
    </filter>
    <filter id="lockGlow">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Shackle (U-shaped top) -->
  <path d="M15 22 L15 14 Q15 5 24 5 Q33 5 33 14 L33 22" fill="none" stroke="url(#shackleGrad)" stroke-width="4" stroke-linecap="round" filter="url(#lockShadow)"/>
  <!-- Shackle highlight -->
  <path d="M16.5 22 L16.5 14.5 Q16.5 7 24 7 Q28 7 30 9.5" fill="none" stroke="#E8F8F8" stroke-opacity="0.3" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Lock body (rounded rectangle) -->
  <rect x="10" y="22" width="28" height="22" rx="3" ry="3" fill="url(#lockBody)" filter="url(#lockShadow)"/>
  <!-- Glass highlight on body -->
  <rect x="10" y="22" width="28" height="10" rx="3" ry="3" fill="url(#lockHL)"/>
  <!-- Crystal facet lines -->
  <line x1="10" y1="30" x2="38" y2="28" stroke="#E8F8F8" stroke-opacity="0.08" stroke-width="0.4"/>
  <line x1="10" y1="36" x2="38" y2="35" stroke="#E8F8F8" stroke-opacity="0.06" stroke-width="0.3"/>
  <!-- Keyhole -->
  <circle cx="24" cy="32" r="3.5" fill="url(#keyholeGrad)" filter="url(#lockGlow)"/>
  <rect x="22.5" y="33" width="3" height="6" rx="1" fill="url(#keyholeGrad)"/>
  <!-- Keyhole highlight ring -->
  <circle cx="24" cy="32" r="3.5" fill="none" stroke="#2ABFBF" stroke-opacity="0.4" stroke-width="0.5"/>
  <!-- Body border -->
  <rect x="10" y="22" width="28" height="22" rx="3" ry="3" fill="none" stroke="#1A8A8A" stroke-opacity="0.3" stroke-width="0.5"/>
</svg>
