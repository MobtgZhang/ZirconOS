<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <radialGradient id="avatarBg" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#A8F0F0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0D5C5C" stop-opacity="0.95"/>
    </radialGradient>
    <linearGradient id="avatarBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F8F8" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#2ABFBF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#1A8A8A" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="avatarHead" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#E8F8F8" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#2ABFBF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#1A8A8A" stop-opacity="0.9"/>
    </radialGradient>
    <linearGradient id="frameGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3FA3D8"/>
      <stop offset="50%" stop-color="#2ABFBF"/>
      <stop offset="100%" stop-color="#1A8A8A"/>
    </linearGradient>
    <filter id="avatarShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#0D5C5C" flood-opacity="0.3"/>
    </filter>
    <clipPath id="circleClip">
      <circle cx="24" cy="24" r="19"/>
    </clipPath>
  </defs>
  <!-- Circle frame background -->
  <circle cx="24" cy="24" r="21" fill="url(#frameGrad)" filter="url(#avatarShadow)"/>
  <circle cx="24" cy="24" r="19" fill="url(#avatarBg)"/>
  <!-- Person silhouette (clipped to circle) -->
  <g clip-path="url(#circleClip)">
    <!-- Shoulders/body -->
    <ellipse cx="24" cy="46" rx="16" ry="14" fill="url(#avatarBody)"/>
    <!-- Glass highlight on body -->
    <ellipse cx="20" cy="40" rx="8" ry="4" fill="white" opacity="0.15"/>
    <!-- Head -->
    <circle cx="24" cy="19" r="8.5" fill="url(#avatarHead)"/>
    <!-- Head glass highlight -->
    <ellipse cx="22" cy="16" rx="4" ry="3" fill="white" opacity="0.2"/>
  </g>
  <!-- Glass frame ring -->
  <circle cx="24" cy="24" r="20" fill="none" stroke="url(#frameGrad)" stroke-width="1.5"/>
  <!-- Frame highlight arc -->
  <path d="M10 12 A19 19 0 0 1 38 12" fill="none" stroke="#E8F8F8" stroke-opacity="0.25" stroke-width="1"/>
</svg>
