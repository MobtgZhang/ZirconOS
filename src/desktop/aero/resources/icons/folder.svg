<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="fldBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A8A8A" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0D5C5C" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="fldFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ABFBF" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#1A8A8A" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0D5C5C" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="fldTab" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3FA3D8"/>
      <stop offset="100%" stop-color="#2ABFBF"/>
    </linearGradient>
    <linearGradient id="fldHL" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="fldShadow">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.2" flood-color="#0D5C5C" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Folder back -->
  <path d="M5 14 L5 40 Q5 42 7 42 L41 42 Q43 42 43 40 L43 14 Z" fill="url(#fldBack)" filter="url(#fldShadow)"/>
  <!-- Tab -->
  <path d="M5 14 L5 10 Q5 8 7 8 L17 8 Q19 8 20 10 L22 14 Z" fill="url(#fldTab)"/>
  <!-- Folder front -->
  <path d="M5 18 Q5 16 7 16 L41 16 Q43 16 43 18 L43 40 Q43 42 41 42 L7 42 Q5 42 5 40 Z" fill="url(#fldFront)"/>
  <!-- Glass highlight -->
  <path d="M5 18 Q5 16 7 16 L41 16 Q43 16 43 18 L43 26 Q30 20 5 26 Z" fill="url(#fldHL)"/>
  <!-- Crystal facet lines -->
  <line x1="5" y1="28" x2="43" y2="24" stroke="#A8F0F0" stroke-opacity="0.12" stroke-width="0.5"/>
  <line x1="5" y1="34" x2="43" y2="32" stroke="#A8F0F0" stroke-opacity="0.08" stroke-width="0.4"/>
  <!-- Bottom edge highlight -->
  <line x1="8" y1="41" x2="40" y2="41" stroke="#E8F8F8" stroke-opacity="0.1" stroke-width="0.5"/>
</svg>
