<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <radialGradient id="nodeGrad1" cx="0.35" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#A8F0F0" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#2ABFBF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0D5C5C" stop-opacity="0.95"/>
    </radialGradient>
    <radialGradient id="nodeGrad2" cx="0.35" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#E8F8F8" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#3FA3D8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1A8A8A" stop-opacity="0.95"/>
    </radialGradient>
    <linearGradient id="linkGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2ABFBF"/>
      <stop offset="50%" stop-color="#A8F0F0"/>
      <stop offset="100%" stop-color="#3FA3D8"/>
    </linearGradient>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="lineGlow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="netShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#0D5C5C" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Connection lines (glowing) -->
  <line x1="15" y1="16" x2="33" y2="16" stroke="url(#linkGrad)" stroke-width="2" filter="url(#lineGlow)" stroke-linecap="round"/>
  <line x1="15" y1="16" x2="24" y2="34" stroke="url(#linkGrad)" stroke-width="2" filter="url(#lineGlow)" stroke-linecap="round"/>
  <line x1="33" y1="16" x2="24" y2="34" stroke="url(#linkGrad)" stroke-width="2" filter="url(#lineGlow)" stroke-linecap="round"/>
  <!-- Data pulse dots on lines -->
  <circle cx="24" cy="16" r="1" fill="#E8F8F8" opacity="0.7"/>
  <circle cx="19" cy="25.5" r="1" fill="#E8F8F8" opacity="0.7"/>
  <circle cx="29" cy="25.5" r="1" fill="#E8F8F8" opacity="0.7"/>
  <!-- Node 1 (top-left) - crystal globe -->
  <circle cx="15" cy="16" r="7" fill="url(#nodeGrad1)" filter="url(#netShadow)"/>
  <ellipse cx="15" cy="16" rx="7" ry="3.5" fill="none" stroke="#E8F8F8" stroke-opacity="0.3" stroke-width="0.5"/>
  <ellipse cx="15" cy="16" rx="3.5" ry="7" fill="none" stroke="#E8F8F8" stroke-opacity="0.3" stroke-width="0.5"/>
  <line x1="8" y1="16" x2="22" y2="16" stroke="#E8F8F8" stroke-opacity="0.2" stroke-width="0.4"/>
  <!-- Glass highlight -->
  <ellipse cx="13" cy="13.5" rx="3" ry="2" fill="white" opacity="0.25"/>
  <!-- Node 2 (top-right) - crystal globe -->
  <circle cx="33" cy="16" r="7" fill="url(#nodeGrad2)" filter="url(#netShadow)"/>
  <ellipse cx="33" cy="16" rx="7" ry="3.5" fill="none" stroke="#E8F8F8" stroke-opacity="0.3" stroke-width="0.5"/>
  <ellipse cx="33" cy="16" rx="3.5" ry="7" fill="none" stroke="#E8F8F8" stroke-opacity="0.3" stroke-width="0.5"/>
  <line x1="26" y1="16" x2="40" y2="16" stroke="#E8F8F8" stroke-opacity="0.2" stroke-width="0.4"/>
  <ellipse cx="31" cy="13.5" rx="3" ry="2" fill="white" opacity="0.25"/>
  <!-- Node 3 (bottom-center) - crystal globe -->
  <circle cx="24" cy="34" r="7" fill="url(#nodeGrad1)" filter="url(#netShadow)"/>
  <ellipse cx="24" cy="34" rx="7" ry="3.5" fill="none" stroke="#E8F8F8" stroke-opacity="0.3" stroke-width="0.5"/>
  <ellipse cx="24" cy="34" rx="3.5" ry="7" fill="none" stroke="#E8F8F8" stroke-opacity="0.3" stroke-width="0.5"/>
  <line x1="17" y1="34" x2="31" y2="34" stroke="#E8F8F8" stroke-opacity="0.2" stroke-width="0.4"/>
  <ellipse cx="22" cy="31.5" rx="3" ry="2" fill="white" opacity="0.25"/>
</svg>
