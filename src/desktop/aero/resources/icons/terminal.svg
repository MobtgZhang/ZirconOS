<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="termFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ABFBF" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#1A8A8A" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0D5C5C" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="termScreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1A1A"/>
      <stop offset="100%" stop-color="#0D2828"/>
    </linearGradient>
    <linearGradient id="termHL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="termShadow">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#0D5C5C" flood-opacity="0.4"/>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Glass frame border -->
  <rect x="4" y="6" width="40" height="36" rx="3" ry="3" fill="url(#termFrame)" filter="url(#termShadow)"/>
  <!-- Inner glass border highlight -->
  <rect x="4" y="6" width="40" height="12" rx="3" ry="3" fill="url(#termHL)"/>
  <!-- Dark screen -->
  <rect x="7" y="9" width="34" height="30" rx="1.5" ry="1.5" fill="url(#termScreen)"/>
  <!-- Scanline effect -->
  <line x1="7" y1="15" x2="41" y2="15" stroke="#2ABFBF" stroke-opacity="0.04" stroke-width="0.3"/>
  <line x1="7" y1="21" x2="41" y2="21" stroke="#2ABFBF" stroke-opacity="0.04" stroke-width="0.3"/>
  <line x1="7" y1="27" x2="41" y2="27" stroke="#2ABFBF" stroke-opacity="0.04" stroke-width="0.3"/>
  <line x1="7" y1="33" x2="41" y2="33" stroke="#2ABFBF" stroke-opacity="0.04" stroke-width="0.3"/>
  <!-- "Z:\" prompt text -->
  <g filter="url(#textGlow)">
    <text x="11" y="20" font-family="monospace" font-size="7" font-weight="bold" fill="#2ABFBF">Z:\&gt;</text>
  </g>
  <!-- Cursor block -->
  <rect x="34" y="14" width="4" height="7" fill="#2ABFBF" opacity="0.7"/>
  <!-- Second line hint -->
  <g filter="url(#textGlow)">
    <text x="11" y="30" font-family="monospace" font-size="5.5" fill="#1A8A8A" opacity="0.6">system ready</text>
  </g>
  <!-- Screen reflection -->
  <rect x="7" y="9" width="34" height="8" rx="1.5" ry="1.5" fill="white" opacity="0.03"/>
</svg>
