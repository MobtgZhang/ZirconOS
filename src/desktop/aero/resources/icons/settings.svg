<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="gearGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A8F0F0" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#2ABFBF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0D5C5C" stop-opacity="0.95"/>
    </linearGradient>
    <radialGradient id="gearCenter" cx="0.45" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#E8F8F8"/>
      <stop offset="100%" stop-color="#3FA3D8"/>
    </radialGradient>
    <linearGradient id="gearHL" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="gearShadow">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#0D5C5C" flood-opacity="0.35"/>
    </filter>
    <filter id="gearGlow">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Gear/cog shape -->
  <g filter="url(#gearShadow)">
    <path d="
      M21 4 L27 4 L28.5 8.5 L31.5 9.5 L35 7 L39.5 11 L37.5 15 L39 17.5 L44 18.5 L44 24.5 L39 25.5 L37.5 28.5 L39.5 32.5 L35 36.5 L31.5 34 L28.5 35 L27 39.5 L21 39.5 L19.5 35 L16.5 34 L13 36.5 L8.5 32.5 L10.5 28.5 L9 25.5 L4 24.5 L4 18.5 L9 17.5 L10.5 15 L8.5 11 L13 7 L16.5 9.5 L19.5 8.5 Z"
      fill="url(#gearGrad)"/>
  </g>
  <!-- Glass highlight on gear -->
  <path d="
    M21 4 L27 4 L28.5 8.5 L31.5 9.5 L35 7 L39.5 11 L37.5 15 L39 17.5 L44 18.5 L44 21 Q34 14 14 21 L4 18.5 L9 17.5 L10.5 15 L8.5 11 L13 7 L16.5 9.5 L19.5 8.5 Z"
    fill="url(#gearHL)"/>
  <!-- Crystal facet lines on gear -->
  <line x1="14" y1="14" x2="34" y2="30" stroke="#E8F8F8" stroke-opacity="0.1" stroke-width="0.4"/>
  <line x1="34" y1="14" x2="14" y2="30" stroke="#E8F8F8" stroke-opacity="0.1" stroke-width="0.4"/>
  <!-- Center hole -->
  <circle cx="24" cy="21.5" r="6.5" fill="url(#gearCenter)" filter="url(#gearGlow)"/>
  <!-- Center inner ring -->
  <circle cx="24" cy="21.5" r="4" fill="none" stroke="#0D5C5C" stroke-opacity="0.3" stroke-width="0.8"/>
  <!-- Center highlight -->
  <ellipse cx="23" cy="20" rx="2.5" ry="1.8" fill="white" opacity="0.25"/>
</svg>
