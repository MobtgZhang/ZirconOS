<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <radialGradient id="globeGrad" cx="0.4" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#A8F0F0" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#2ABFBF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0D5C5C" stop-opacity="0.95"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3FA3D8"/>
      <stop offset="50%" stop-color="#2ABFBF"/>
      <stop offset="100%" stop-color="#1A8A8A"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A8F0F0"/>
      <stop offset="100%" stop-color="#3FA3D8"/>
    </linearGradient>
    <filter id="globeShadow">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#0D5C5C" flood-opacity="0.35"/>
    </filter>
    <filter id="globeGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer compass ring -->
  <circle cx="24" cy="24" r="21" fill="none" stroke="url(#ringGrad)" stroke-width="2.5" stroke-opacity="0.6" filter="url(#globeShadow)"/>
  <!-- Cardinal tick marks -->
  <line x1="24" y1="2" x2="24" y2="5" stroke="#3FA3D8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="43" x2="24" y2="46" stroke="#3FA3D8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="2" y1="24" x2="5" y2="24" stroke="#3FA3D8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="43" y1="24" x2="46" y2="24" stroke="#3FA3D8" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Globe sphere -->
  <circle cx="24" cy="24" r="16" fill="url(#globeGrad)" filter="url(#globeShadow)"/>
  <!-- Latitude lines -->
  <ellipse cx="24" cy="24" rx="16" ry="6" fill="none" stroke="#E8F8F8" stroke-opacity="0.3" stroke-width="0.5"/>
  <ellipse cx="24" cy="24" rx="16" ry="12" fill="none" stroke="#E8F8F8" stroke-opacity="0.25" stroke-width="0.5"/>
  <!-- Longitude lines -->
  <ellipse cx="24" cy="24" rx="6" ry="16" fill="none" stroke="#E8F8F8" stroke-opacity="0.3" stroke-width="0.5"/>
  <ellipse cx="24" cy="24" rx="12" ry="16" fill="none" stroke="#E8F8F8" stroke-opacity="0.25" stroke-width="0.5"/>
  <!-- Equator and prime meridian -->
  <line x1="8" y1="24" x2="40" y2="24" stroke="#E8F8F8" stroke-opacity="0.2" stroke-width="0.4"/>
  <line x1="24" y1="8" x2="24" y2="40" stroke="#E8F8F8" stroke-opacity="0.2" stroke-width="0.4"/>
  <!-- Glass highlight -->
  <ellipse cx="20" cy="18" rx="8" ry="5" fill="white" opacity="0.2"/>
  <!-- Circular arrow (navigation) -->
  <path d="M38 10 A18 18 0 0 1 42 20" fill="none" stroke="url(#arrowGrad)" stroke-width="2" stroke-linecap="round" filter="url(#globeGlow)"/>
  <polygon points="43,20 40,17 44,17.5" fill="#A8F0F0"/>
</svg>
