# ZirconOS Sun Valley Sound Scheme
# Maps system events to sound identifiers.
# Sounds are synthesized by the AC97/audio driver.

[SoundScheme]
Name=ZirconOS Sun Valley
Version=1.0

[Events]
Startup=zircon_startup_sv
Logon=zircon_logon_sv
Logoff=zircon_logoff_sv
Shutdown=zircon_shutdown_sv
CriticalStop=zircon_critical_sv
Exclamation=zircon_exclamation_sv
Question=zircon_question_sv
Asterisk=zircon_asterisk_sv
DefaultBeep=zircon_default_sv
Notification=zircon_notification_sv
SnapAttach=zircon_snap_attach
SnapDetach=zircon_snap_detach
WidgetOpen=zircon_widget_open
QuickSettingsOpen=zircon_qs_open
DeviceConnect=zircon_device_connect_sv
DeviceDisconnect=zircon_device_disconnect_sv
