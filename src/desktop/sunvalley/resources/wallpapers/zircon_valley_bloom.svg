<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wvb_bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0C1428"/>
      <stop offset="30%" stop-color="#142440"/>
      <stop offset="60%" stop-color="#1C3460"/>
      <stop offset="100%" stop-color="#102038"/>
    </linearGradient>
    <radialGradient id="wvb_bloom1" cx="25%" cy="70%" r="35%">
      <stop offset="0%" stop-color="#4CB0E8" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#2878B0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1A5A8C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wvb_bloom2" cx="75%" cy="40%" r="30%">
      <stop offset="0%" stop-color="#78CCF0" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#4CA8D8" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#3898D0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wvb_bloom3" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#F0A030" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F0A030" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wvb_ribbon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4CB0E8" stop-opacity="0"/>
      <stop offset="30%" stop-color="#4CB0E8" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#78CCF0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4CB0E8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#wvb_bg)"/>
  <rect width="1920" height="1080" fill="url(#wvb_bloom1)"/>
  <rect width="1920" height="1080" fill="url(#wvb_bloom2)"/>
  <rect width="1920" height="1080" fill="url(#wvb_bloom3)"/>

  <!-- Flowing ribbons -->
  <path d="M-100,540 C200,440 500,640 800,520 C1100,400 1400,600 1700,480 C1800,440 1920,500 2020,460" fill="none" stroke="url(#wvb_ribbon)" stroke-width="3"/>
  <path d="M-100,600 C300,520 600,700 900,580 C1200,460 1500,640 1800,540 C1860,520 1920,550 2020,530" fill="none" stroke="url(#wvb_ribbon)" stroke-width="2" opacity="0.6"/>
  <path d="M-100,660 C250,600 550,740 850,640 C1150,540 1450,690 1750,600 L2020,560" fill="none" stroke="url(#wvb_ribbon)" stroke-width="1.5" opacity="0.4"/>

  <!-- Subtle wave fill -->
  <path d="M0,750 C320,700 640,790 960,720 C1280,650 1600,760 1920,700 L1920,1080 L0,1080 Z" fill="#0A1628" opacity="0.5"/>

  <!-- Star-like particles -->
  <circle cx="100" cy="80" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="320" cy="200" r="1" fill="#4CB0E8" opacity="0.35"/>
  <circle cx="580" cy="60" r="1.2" fill="white" opacity="0.3"/>
  <circle cx="800" cy="150" r="0.9" fill="#78CCF0" opacity="0.3"/>
  <circle cx="1050" cy="50" r="1.3" fill="white" opacity="0.35"/>
  <circle cx="1300" cy="120" r="1" fill="#4CB0E8" opacity="0.3"/>
  <circle cx="1550" cy="80" r="1.4" fill="white" opacity="0.25"/>
  <circle cx="1800" cy="160" r="1.1" fill="#78CCF0" opacity="0.3"/>
  <circle cx="200" cy="450" r="0.8" fill="#F0A030" opacity="0.2"/>
  <circle cx="1600" cy="380" r="1" fill="#F0A030" opacity="0.18"/>
