<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wvd_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06101C"/>
      <stop offset="40%" stop-color="#0C1E34"/>
      <stop offset="70%" stop-color="#102848"/>
      <stop offset="100%" stop-color="#081420"/>
    </linearGradient>
    <radialGradient id="wvd_glow1" cx="30%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#1A5A8C" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1A5A8C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wvd_glow2" cx="70%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#4CB0E8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4CB0E8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wvd_warm" cx="80%" cy="25%" r="25%">
      <stop offset="0%" stop-color="#F0A030" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F0A030" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wvd_wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A5A8C" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#3898D0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1A5A8C" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="wvd_wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4CB0E8" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#78CCF0" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#4CB0E8" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#wvd_bg)"/>

  <!-- Ambient glows -->
  <rect width="1920" height="1080" fill="url(#wvd_glow1)"/>
  <rect width="1920" height="1080" fill="url(#wvd_glow2)"/>
  <rect width="1920" height="1080" fill="url(#wvd_warm)"/>

  <!-- Flowing wave layers -->
  <path d="M0,620 C320,550 640,680 960,600 C1280,520 1600,660 1920,580 L1920,1080 L0,1080 Z" fill="url(#wvd_wave1)"/>
  <path d="M0,720 C400,660 800,770 1200,690 C1400,650 1700,740 1920,700 L1920,1080 L0,1080 Z" fill="url(#wvd_wave2)"/>
  <path d="M0,830 C240,790 520,860 780,820 C1040,780 1360,850 1600,810 C1760,790 1880,820 1920,830 L1920,1080 L0,1080 Z" fill="#0A1628" opacity="0.6"/>

  <!-- Subtle particle dots -->
  <circle cx="180" cy="200" r="1.5" fill="#4CB0E8" opacity="0.3"/>
  <circle cx="520" cy="150" r="1" fill="white" opacity="0.2"/>
  <circle cx="890" cy="100" r="1.2" fill="#78CCF0" opacity="0.25"/>
  <circle cx="1300" cy="180" r="1" fill="#4CB0E8" opacity="0.3"/>
  <circle cx="1600" cy="120" r="1.3" fill="white" opacity="0.2"/>
  <circle cx="400" cy="400" r="0.8" fill="#68B8E0" opacity="0.2"/>
  <circle cx="1100" cy="350" r="0.9" fill="#4CB0E8" opacity="0.2"/>
  <circle cx="1700" cy="450" r="1" fill="#78CCF0" opacity="0.15"/>

  <!-- Warm accent particles -->
  <circle cx="1500" cy="250" r="2" fill="#F0A030" opacity="0.15"/>
  <circle cx="1650" cy="300" r="1.5" fill="#E89828" opacity="0.12"/>
</svg>
