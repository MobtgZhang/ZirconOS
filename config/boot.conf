# ZirconOS Boot Configuration
# Controls boot-time behavior and early initialization.

[boot]
timeout = 5
default_entry = normal
verbose = false
splash_enabled = true

[multiboot]
magic = 0x36D76289
cmdline_max = 256

[grub]
gfxmode = 1024x768x32
gfxpayload = keep
timeout = 5

[uefi]
secure_boot = false
resolution = 1024x768

[zbm]
bcd_path = \\Boot\\BCD
loader_path = \\Boot\\zbm.efi
menu_timeout = 10
