# ZirconOS System Configuration
# This file defines core operating system parameters.

[system]
hostname = ZirconOS
version = 1.0.0
arch = x86_64
build_type = debug
max_cpus = 4
tick_rate_hz = 100

[memory]
heap_size_kb = 4096
frame_size = 4096
max_physical_mb = 4096
stack_size_kb = 64
user_stack_size_kb = 256
kernel_heap_start = 0xFFFF800000000000

[scheduler]
max_processes = 256
max_threads = 1024
time_slice_ms = 20
priority_levels = 32
idle_priority = 0
default_priority = 8

[display]
default_width = 1024
default_height = 768
default_bpp = 32
text_cols = 80
text_rows = 25
font_height = 16
font_width = 8

[console]
serial_enabled = true
serial_baud = 115200
serial_port = 0x3F8
vga_enabled = true
log_level = info

[filesystem]
root_fs = fat32
root_device = C
ntfs_device = D
max_open_files = 256
max_mount_points = 16
path_max = 260

[network]
enabled = false
dhcp = true
hostname = ZirconOS
dns_primary = 8.8.8.8
dns_secondary = 8.8.4.4

[security]
default_token_privileges = standard
max_sid_count = 64
audit_enabled = false

[win32]
subsystem_enabled = true
wow64_enabled = true
max_windows = 128
max_gdi_objects = 1024
default_shell = explorer

[drivers]
video_stack = true
vga_driver = true
hdmi_driver = true
framebuffer_driver = true
display_manager = true
