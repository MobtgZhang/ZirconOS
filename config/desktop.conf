# ZirconOS Desktop Configuration
# Defines desktop environment parameters for the shell.
# Referenced by: config/defaults.zig → src/config/config.zig
#
# Available themes (from 3rdparty/):
#   classic    - Windows 2000 Classic (3rdparty/ZirconOSClassic)
#   luna       - Windows XP Luna     (3rdparty/ZirconOSLuna)       ★ default
#   aero       - Windows Vista/7     (3rdparty/ZirconOSAero)
#   modern     - Windows 8 Metro     (3rdparty/ZirconOSModern)
#   fluent     - Windows 10 Fluent   (3rdparty/ZirconOSFluent)
#   sunvalley  - Windows 11          (3rdparty/ZirconOSSunValley)
#
# Theme-specific color_scheme values:
#   classic:    windows95 | windows2000 | highcontrast
#   luna:       blue | olive | silver
#   aero:       default | blue | graphite
#   modern:     cobalt | emerald | crimson | mango | purple | teal
#   fluent:     light | dark
#   sunvalley:  light | dark

[desktop]
theme = luna
color_scheme = blue
shell = explorer
auto_logon = false
auto_logon_user =

[resolution]
width = 1024
height = 768
bpp = 32
refresh_rate = 60
dpi = 96

[wallpaper]
style = solid_color
color = 0x004E98
path =

[display]
driver = auto
vsync = true
double_buffer = true
hardware_cursor = true
max_monitors = 4
primary_monitor = 0

[video_driver]
vga_enabled = true
vga_base = 0xB8000
framebuffer_enabled = true
hdmi_enabled = false
hdmi_audio = false
edid_detect = true

[window_manager]
max_windows = 128
max_z_order = 256
focus_follows_mouse = false
snap_to_edge = true
animate_windows = true
animation_speed = 200
shadow_enabled = true
shadow_size = 4

[taskbar]
position = bottom
height = 30
auto_hide = false
show_clock = true
show_tray = true
show_quick_launch = true
group_similar = true

[startmenu]
style = xp
show_recent = true
max_recent = 6
show_my_computer = true
show_my_documents = true
show_network = true
show_run = true
show_search = true

[icons]
show_desktop_icons = true
icon_size = 32
icon_spacing_x = 75
icon_spacing_y = 75
auto_arrange = true
align_to_grid = true
show_my_computer = true
show_my_documents = true
show_network_places = true
show_recycle_bin = true
show_internet_explorer = true

[login]
welcome_screen = true
fast_user_switching = true
screen_saver_timeout = 600
lock_timeout = 300
panel_width = 400
panel_height = 300

[fonts]
system_font = Tahoma
system_font_size = 8
titlebar_font = Trebuchet MS
titlebar_font_size = 10
menu_font = Tahoma
menu_font_size = 8
icon_font = Tahoma
icon_font_size = 8
